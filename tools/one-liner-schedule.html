<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One-Liner Schedule Builder — How It's Filmed</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <style>
    /* ─── RESET ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── TOKENS ─────────────────────────────────────── */
    :root {
      --bg:          #0a0a0a;
      --s1:          #111111;
      --s2:          #161616;
      --s3:          #1e1e1e;
      --s4:          #252525;
      --border:      #252525;
      --border2:     #333333;
      --red:         #FF3333;
      --red-dim:     #cc2929;
      --red-glow:    rgba(255,51,51,.18);
      --text:        #f0f0f0;
      --text2:       #999999;
      --text3:       #555555;
      --display:     'Bebas Neue', sans-serif;
      --body:        'Inter', sans-serif;
      --radius:      4px;
    }

    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── SCROLLBAR ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--s1); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ─── TOP NAV ────────────────────────────────────── */
    .top-nav {
      position: sticky; top: 0; z-index: 100;
      background: #090909;
      border-bottom: 1px solid var(--border);
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      gap: 12px;
    }
    .nav-brand {
      font-family: var(--display);
      font-size: 20px; letter-spacing: 1.5px;
      color: var(--text);
      display: flex; align-items: center; gap: 2px;
      white-space: nowrap;
    }
    .nav-brand .dot { color: var(--red); }
    .nav-brand .sub { font-size: 13px; opacity: .5; margin-left: 8px; letter-spacing: 1px; }
    .nav-actions { display: flex; gap: 6px; align-items: center; }

    /* ─── SUMMARY BAR ────────────────────────────────── */
    .summary-bar {
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex; align-items: center; gap: 0;
      overflow-x: auto;
    }
    .stat {
      display: flex; flex-direction: column; align-items: center;
      padding: 0 20px;
      min-width: 80px;
    }
    .stat .val {
      font-family: var(--display);
      font-size: 26px; line-height: 1;
      color: var(--red);
    }
    .stat .lbl {
      font-size: 9px; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--text3);
      margin-top: 2px;
    }
    .stat-div { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }

    /* ─── PROJECT HEADER ─────────────────────────────── */
    .proj-header {
      background: var(--s2);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }
    .proj-grid {
      display: grid;
      grid-template-columns: 2.5fr 1fr 1fr 1.2fr;
      gap: 14px;
      max-width: 1100px;
    }
    @media (max-width: 800px) { .proj-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .proj-grid { grid-template-columns: 1fr; } }

    .fld { display: flex; flex-direction: column; gap: 3px; }
    .fld-label {
      font-size: 9px; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--text3);
      font-weight: 600;
    }
    .fld-input {
      background: var(--s3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--body); font-size: 13px;
      padding: 7px 10px; outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .fld-input:focus { border-color: var(--red); }
    .fld-input.proj-title {
      font-family: var(--display);
      font-size: 20px; letter-spacing: 1px;
    }

    /* ─── MAIN / SCHEDULE ────────────────────────────── */
    .schedule-wrap { padding: 20px; }

    .toolbar {
      display: flex; gap: 8px; align-items: center;
      flex-wrap: wrap; margin-bottom: 22px;
    }
    .toolbar-spacer { flex: 1; }

    /* ─── DAY BLOCK ──────────────────────────────────── */
    .day-block { margin-bottom: 6px; }

    .day-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0 6px;
    }
    .day-num {
      font-family: var(--display);
      font-size: 26px; line-height: 1;
      color: var(--red); white-space: nowrap;
    }
    .day-date-in {
      background: transparent; border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text2); font-family: var(--body);
      font-size: 12px; padding: 2px 4px;
      outline: none; width: 130px;
      transition: border-color .15s;
    }
    .day-date-in:focus { border-color: var(--red); color: var(--text); }
    .day-meta {
      margin-left: auto;
      display: flex; align-items: center; gap: 14px;
      font-size: 11px; color: var(--text2);
    }
    .day-meta strong { color: var(--text); font-weight: 600; }
    .day-cast-line {
      font-size: 10px; color: var(--text3);
      padding: 0 0 7px; letter-spacing: .3px;
    }

    /* ─── STRIP HEADER ROW ───────────────────────────── */
    .strip-header {
      display: grid;
      grid-template-columns: 42px 56px 110px 1fr 62px 58px 52px auto 36px;
      gap: 0; margin-bottom: 3px;
    }
    .sh-cell {
      font-size: 8px; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--text3);
      padding: 0 8px 3px;
    }
    .sh-cell:first-child { padding-left: 14px; }

    /* ─── STRIPS CONTAINER ───────────────────────────── */
    .strips-container {
      min-height: 44px; border-radius: var(--radius);
      transition: background .15s;
    }
    .strips-container.drag-over {
      background: rgba(255,51,51,.04);
      outline: 1px dashed rgba(255,51,51,.35);
    }
    .drop-hint {
      text-align: center; padding: 14px;
      font-size: 11px; color: var(--text3);
      font-style: italic;
    }

    /* ─── SCENE STRIP ────────────────────────────────── */
    .strip {
      display: grid;
      grid-template-columns: 42px 56px 110px 1fr 62px 58px 52px auto 36px;
      gap: 0;
      min-height: 46px;
      margin-bottom: 3px;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: grab;
      position: relative;
      background: var(--s2);
      border: 1px solid var(--border);
      transition: border-color .12s, box-shadow .12s;
    }
    .strip:hover {
      border-color: var(--border2);
      box-shadow: 0 2px 10px rgba(0,0,0,.5);
    }
    .strip.sortable-ghost { opacity: .25; }
    .strip.sortable-chosen { opacity: .85; }
    .strip.sortable-drag {
      box-shadow: 0 8px 28px rgba(0,0,0,.7);
      transform: rotate(.4deg) scale(1.01);
      cursor: grabbing;
      z-index: 9999;
    }

    /* Color tab */
    .strip-tab {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 5px;
      border-radius: var(--radius) 0 0 var(--radius);
    }

    .sc {  /* strip cell */
      padding: 5px 8px;
      display: flex; align-items: center;
      border-right: 1px solid var(--border);
      font-size: 12px; min-width: 0;
    }
    .sc:last-child { border-right: none; }

    .sc-num {
      padding-left: 13px;
      font-family: var(--display); font-size: 20px;
      color: var(--text); justify-content: center;
    }
    .sc-ie {
      font-size: 10px; font-weight: 700;
      letter-spacing: .8px; color: var(--text2);
      justify-content: center;
    }
    .sc-loc {
      font-weight: 600; font-size: 11px;
      color: var(--text); text-transform: uppercase;
      letter-spacing: .4px;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis; display: block;
    }
    .sc-desc {
      font-size: 11px; color: var(--text2);
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis; display: block;
    }
    .sc-dn {
      font-size: 9px; font-weight: 700;
      letter-spacing: .8px; color: var(--text2);
      justify-content: center;
    }
    .sc-pg {
      font-family: var(--display); font-size: 18px;
      justify-content: center; color: var(--text);
    }
    .sc-time {
      font-size: 10px; color: var(--text2);
      justify-content: center;
    }
    .sc-cast {
      flex-wrap: wrap; gap: 3px;
      padding: 4px 6px; display: flex; align-items: center;
    }
    .c-tag {
      background: var(--s4); border: 1px solid var(--border2);
      color: var(--text2); font-size: 9px;
      padding: 2px 5px; border-radius: 2px;
      white-space: nowrap;
    }
    .sc-act {
      padding: 3px 4px;
      display: flex; flex-direction: column;
      gap: 2px; justify-content: center;
      border-right: none;
    }
    .act-btn {
      background: none; border: none;
      color: var(--text3); cursor: pointer;
      width: 26px; height: 22px;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: all .12s;
    }
    .act-btn:hover { background: var(--s4); color: var(--text); }
    .act-btn.del:hover { background: rgba(255,51,51,.12); color: var(--red); }

    /* ─── RESPONSIVE STRIPS ──────────────────────────── */
    @media (max-width: 900px) {
      .strip, .strip-header {
        grid-template-columns: 38px 52px 96px 1fr 56px 52px auto 32px;
      }
      .sc-time, .strip-header .sh-cell:nth-child(7) { display: none; }
    }
    @media (max-width: 640px) {
      .strip, .strip-header {
        grid-template-columns: 34px 46px 1fr 48px 46px auto 28px;
      }
      .sc-loc, .strip-header .sh-cell:nth-child(3) { display: none; }
    }

    /* ─── PANEL ──────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 200; opacity: 0; visibility: hidden;
      transition: opacity .22s, visibility .22s;
    }
    .overlay.open { opacity: 1; visibility: visible; }

    .panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 460px; max-width: 100vw;
      background: var(--s1);
      border-left: 1px solid var(--border);
      z-index: 201;
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel.open { transform: translateX(0); }

    .panel-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-title {
      font-family: var(--display); font-size: 22px;
      letter-spacing: 1px; color: var(--text);
    }
    .panel-close {
      background: none; border: 1px solid var(--border);
      color: var(--text2); width: 30px; height: 30px;
      border-radius: 3px; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .panel-close:hover { border-color: var(--red); color: var(--red); }

    .panel-body {
      flex: 1; overflow-y: auto; padding: 20px;
    }
    .panel-body .fld { margin-bottom: 14px; }
    .panel-body .fld-input { width: 100%; }

    .panel-foot {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px;
      flex-shrink: 0;
    }

    /* ─── TOGGLE BUTTONS ─────────────────────────────── */
    .toggle-grp {
      display: flex;
      background: var(--s3); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .tog {
      flex: 1; background: none; border: none;
      color: var(--text2); font-family: var(--body);
      font-size: 11px; font-weight: 700;
      padding: 8px 10px; cursor: pointer;
      letter-spacing: .6px;
      transition: all .12s;
    }
    .tog.on { background: var(--red); color: #fff; }

    /* ─── COLOR PRESETS ──────────────────────────────── */
    .color-grid { display: flex; gap: 7px; flex-wrap: wrap; }
    .color-swatch {
      width: 34px; height: 34px; border-radius: 3px;
      border: 2px solid transparent; cursor: pointer;
      position: relative; transition: all .12s;
      flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.12); }
    .color-swatch.sel { border-color: #fff; box-shadow: 0 0 0 2px var(--red); }
    .color-swatch .tip {
      position: absolute; bottom: calc(100% + 5px);
      left: 50%; transform: translateX(-50%);
      background: #1a1a1a; border: 1px solid var(--border2);
      color: var(--text); font-size: 9px;
      padding: 3px 6px; border-radius: 3px;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity .12s;
    }
    .color-swatch:hover .tip { opacity: 1; }

    /* ─── CAST TAG INPUT ─────────────────────────────── */
    .cast-wrap {
      background: var(--s3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 5px;
      display: flex; flex-wrap: wrap; gap: 4px;
      min-height: 40px; cursor: text;
      transition: border-color .15s;
    }
    .cast-wrap:focus-within { border-color: var(--red); }
    .cast-pill {
      background: var(--red); color: #fff;
      font-size: 11px; padding: 2px 7px;
      border-radius: 2px;
      display: flex; align-items: center; gap: 4px;
    }
    .cast-pill button {
      background: none; border: none;
      color: rgba(255,255,255,.7); cursor: pointer;
      font-size: 13px; line-height: 1; padding: 0;
      display: flex; align-items: center;
    }
    .cast-pill button:hover { color: #fff; }
    .cast-in {
      background: none; border: none; color: var(--text);
      font-family: var(--body); font-size: 12px;
      outline: none; flex: 1; min-width: 80px;
      padding: 2px 4px;
    }

    /* ─── AUTOCOMPLETE ───────────────────────────────── */
    .ac-wrap { position: relative; }
    .ac-drop {
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--s1); border: 1px solid var(--border2);
      border-top: none; border-radius: 0 0 var(--radius) var(--radius);
      z-index: 300; max-height: 150px; overflow-y: auto;
      display: none;
    }
    .ac-item {
      padding: 7px 12px; font-size: 12px;
      cursor: pointer; color: var(--text);
      transition: background .1s;
    }
    .ac-item:hover { background: var(--s3); color: var(--red); }

    /* ─── BUTTONS ────────────────────────────────────── */
    .btn {
      font-family: var(--body); font-size: 12px;
      font-weight: 600; padding: 9px 16px;
      border-radius: var(--radius); border: none;
      cursor: pointer; transition: all .15s;
      display: inline-flex; align-items: center;
      gap: 5px; letter-spacing: .2px;
      white-space: nowrap;
    }
    .btn-primary   { background: var(--red); color: #fff; }
    .btn-primary:hover { background: var(--red-dim); box-shadow: 0 4px 14px var(--red-glow); }
    .btn-secondary { background: var(--s3); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--s4); border-color: var(--border2); }
    .btn-ghost     { background: none; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
    .btn-danger    { background: none; color: var(--red); border: 1px solid rgba(255,51,51,.3); }
    .btn-danger:hover { background: rgba(255,51,51,.1); }
    .btn-sm { font-size: 11px; padding: 6px 11px; }
    .btn-xs { font-size: 10px; padding: 4px 8px; }
    .btn-ico { padding: 8px 10px; }

    .day-del-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text3); border-radius: 3px;
      padding: 3px 8px; font-size: 10px;
      cursor: pointer; transition: all .15s;
      font-family: var(--body);
    }
    .day-del-btn:hover { border-color: var(--red); color: var(--red); }

    /* ─── EMPTY STATE ────────────────────────────────── */
    .empty {
      text-align: center; padding: 64px 24px;
      color: var(--text3);
    }
    .empty h3 {
      font-family: var(--display); font-size: 30px;
      color: var(--text2); margin-bottom: 8px; letter-spacing: 1px;
    }
    .empty p { font-size: 13px; margin-bottom: 24px; line-height: 1.6; }

    /* ─── MODAL ──────────────────────────────────────── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 400;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all .18s;
    }
    .modal-bg.open { opacity: 1; visibility: visible; }
    .modal-box {
      background: var(--s1); border: 1px solid var(--border2);
      border-radius: 6px; padding: 26px;
      max-width: 400px; width: 90%;
      transform: scale(.95); transition: transform .18s;
    }
    .modal-bg.open .modal-box { transform: scale(1); }
    .modal-title {
      font-family: var(--display); font-size: 22px;
      letter-spacing: 1px; margin-bottom: 10px;
    }
    .modal-body {
      font-size: 13px; color: var(--text2);
      margin-bottom: 20px; line-height: 1.6;
    }
    .modal-foot { display: flex; gap: 8px; justify-content: flex-end; }

    /* ─── HINT CHIP ──────────────────────────────────── */
    .hint { font-size: 9px; color: var(--text3); margin-top: 2px; }

    /* ─────────────────────────────────────────────────
       PRINT STYLES
    ───────────────────────────────────────────────── */
    .print-header { display: none; }

    @media print {
      @page { margin: .5in .6in; }

      .top-nav, .summary-bar, .proj-header,
      .toolbar, .panel, .overlay, .modal-bg,
      .sc-act, .day-del-btn, .btn, .day-date-in { display: none !important; }

      body { background: #fff !important; color: #000 !important;
             font-family: Arial, sans-serif !important; font-size: 9pt; }

      .schedule-wrap { padding: 0 !important; }

      .print-header { display: block !important; margin-bottom: 16pt; }
      .print-title  { font-family: Arial Black, sans-serif; font-size: 16pt; font-weight: 900; }
      .print-meta   { font-size: 8pt; color: #444; margin-top: 4pt; display: flex; gap: 24pt; flex-wrap: wrap; }
      .print-meta span strong { color: #000; }
      .print-rule   { border: none; border-top: 2pt solid #000; margin: 8pt 0 14pt; }

      .day-block { break-inside: avoid-page; margin-bottom: 10pt; }

      .day-num  { font-family: Arial Black, sans-serif !important;
                  font-size: 12pt !important; color: #000 !important;
                  border-bottom: 1pt solid #000; padding-bottom: 3pt;
                  letter-spacing: 1px; }
      .day-meta { font-size: 8pt !important; color: #000 !important; }
      .day-meta strong { color: #000 !important; }
      .day-cast-line { font-size: 7.5pt; color: #444; }

      .strip-header {
        grid-template-columns: 38pt 48pt 90pt 1fr 50pt 46pt 44pt auto !important;
        margin-bottom: 2pt;
      }
      .sh-cell { font-size: 7pt; color: #666; padding: 0 5pt 2pt; border-bottom: .5pt solid #ccc; }
      .sh-cell:first-child { padding-left: 10pt; }

      .strip {
        grid-template-columns: 38pt 48pt 90pt 1fr 50pt 46pt 44pt auto !important;
        border: .5pt solid #ccc !important;
        border-left: none !important;
        margin-bottom: 2pt; min-height: 22pt;
        break-inside: avoid;
        background: #fff !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .sc { border-right: .5pt solid #ddd !important; padding: 3pt 5pt; font-size: 8pt; color: #000; }
      .sc-num { font-family: Arial Black, sans-serif !important; font-size: 14pt !important; padding-left: 10pt; justify-content: center; }
      .sc-ie, .sc-dn { font-size: 7pt; color: #333; }
      .sc-loc { font-size: 8pt; font-weight: 700; color: #000; }
      .sc-desc { font-size: 8pt; color: #444; }
      .sc-pg { font-family: Arial Black, sans-serif !important; font-size: 12pt !important; }
      .sc-time { font-size: 7.5pt; }
      .c-tag { background: #eee !important; color: #333 !important; border-color: #ccc !important; font-size: 7pt; }
      .strip-tab { -webkit-print-color-adjust: exact; print-color-adjust: exact; width: 8pt; }

      .drops-container { min-height: 0; }
      .drop-hint { display: none; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════
     TOP NAV
═════════════════════════════════════════ -->
<nav class="top-nav">
  <div class="nav-brand">
    HIF<span class="dot">.</span>TOOLS
    <span class="sub">ONE-LINER BUILDER</span>
  </div>
  <div class="nav-actions">
    <button class="btn btn-ghost btn-sm" onclick="printOneLiner()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print One-Liner
    </button>
    <button class="btn btn-ghost btn-sm" onclick="askNewProject()">New Project</button>
  </div>
</nav>

<!-- ════════════════════════════════════════
     SUMMARY BAR
═════════════════════════════════════════ -->
<div class="summary-bar">
  <div class="stat">
    <div class="val" id="s-days">—</div>
    <div class="lbl">Shoot Days</div>
  </div>
  <div class="stat-div"></div>
  <div class="stat">

<!-- ════════════════════════════════════════
     SCRIPT
═════════════════════════════════════════ -->
<script>
/* ───────────────────────────────────────────
   CONSTANTS & DEFAULTS
─────────────────────────────────────────── */
const STORE_KEY = 'hif-one-liner-v2';

const COLORS = [
  { name:'White',  hex:'#FFFFFF', label:'Day Interior',       dark:true  },
  { name:'Yellow', hex:'#FFE040', label:'Day Exterior',       dark:true  },
  { name:'Blue',   hex:'#4A90D9', label:'Night Interior',     dark:false },
  { name:'Green',  hex:'#3DB87A', label:'Night Exterior',     dark:true  },
  { name:'Red',    hex:'#FF4444', label:'Action / Stunts',    dark:false },
  { name:'Pink',   hex:'#FF7BA8', label:'Special Effects',    dark:true  },
  { name:'Orange', hex:'#FF8C42', label:'Second Unit',        dark:true  },
  { name:'Tan',    hex:'#C9A76A', label:'Dawn / Dusk',        dark:true  },
  { name:'Purple', hex:'#9B5DE5', label:'VFX / Motion Cap',  dark:false },
  { name:'Gray',   hex:'#6E6E6E', label:'Non-Camera / Other',dark:false },
];

const AUTO_COLOR = {
  'INT-DAY':'White', 'EXT-DAY':'Yellow',
  'INT-NIGHT':'Blue', 'EXT-NIGHT':'Green',
  'INT-DAWN':'Tan', 'EXT-DAWN':'Tan',
  'INT-DUSK':'Orange','EXT-DUSK':'Orange',
};

/* ───────────────────────────────────────────
   STATE
─────────────────────────────────────────── */
let S = {
  project: { name:'', director:'', firstAD:'', startDate:'' },
  days: [],   // [{ id, dayNumber, date, scenes:[] }]
};

/* Form state */
let fCast = [];
let fIE   = 'INT';
let fDN   = 'DAY';
let fColor= 'White';
let editId = null;   // scene id being edited
let editDayId = null;

/* ───────────────────────────────────────────
   UTILS — PAGES
─────────────────────────────────────────── */
function parsePages(s) {
  if (!s) return 0;
  s = s.trim();
  const mixed = s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if (mixed) return +mixed[1] + +mixed[2] / +mixed[3];
  const frac  = s.match(/^(\d+)\/(\d+)$/);
  if (frac)  return +frac[1] / +frac[2];
  const dec = parseFloat(s);
  return isNaN(dec) ? 0 : dec;
}

function fmtPages(d) {
  if (!d) return '0';
  const w = Math.floor(d);
  const e = Math.round((d - w) * 8);
  if (e === 0) return String(w);
  if (e === 8) return String(w + 1);
  return w ? `${w} ${e}/8` : `${e}/8`;
}

function pagesMin(pages) { return pages; } // 1 page ≈ 1 min

function parseTime(s) {
  if (!s) return 0;
  const m = s.match(/^(\d+):(\d+)$/);
  if (m) return +m[1] + +m[2] / 60;
  return parseFloat(s) || 0;
}

function fmtTime(mins) {
  const m = Math.floor(mins);
  const s = Math.round((mins - m) * 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

/* ───────────────────────────────────────────
   UTILS — MISC
─────────────────────────────────────────── */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function allLocations() {
  const locs = new Set();
  S.days.forEach(d => d.scenes.forEach(sc => { if (sc.loc) locs.add(sc.loc); }));
  return [...locs];
}

function sceneTime(sc) {
  const ov = parseTime(sc.timeOverride);
  return ov > 0 ? ov : pagesMin(parsePages(sc.pages));
}

/* ───────────────────────────────────────────
   STORAGE
─────────────────────────────────────────── */
let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(S)); } catch(e){}
    flash('autosave-badge');
  }, 400);
}

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) S = { ...S, ...JSON.parse(raw) };
  } catch(e) {}
}

function flash(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; }, 2200);
}

/* ───────────────────────────────────────────
   PROJECT HEADER
─────────────────────────────────────────── */
function onProjChange() {
  S.project.name      = document.getElementById('p-name').value;
  S.project.director  = document.getElementById('p-dir').value;
  S.project.firstAD   = document.getElementById('p-ad').value;
  S.project.startDate = document.getElementById('p-date').value;
  document.title = S.project.name
    ? S.project.name + ' — One-Liner Builder'
    : 'One-Liner Builder — How It\'s Filmed';
  updateSummary();
  save();
}

function loadProjHeader() {
  document.getElementById('p-name').value = S.project.name      || '';
  document.getElementById('p-dir').value  = S.project.director  || '';
  document.getElementById('p-ad').value   = S.project.firstAD   || '';
  document.getElementById('p-date').value = S.project.startDate || '';
  if (S.project.name) document.title = S.project.name + ' — One-Liner Builder';
}

/* ───────────────────────────────────────────
   RENDERING
─────────────────────────────────────────── */
function render() {
  const el = document.getElementById('schedule-content');

  if (S.days.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <h3>NO SCENES YET</h3>
        <p>Add your first scene strip to start building your schedule.<br>
           Use "Add Day Break" to organize scenes across multiple shoot days.</p>
        <button class="btn btn-primary" onclick="openPanel()">+ Add First Scene</button>
      </div>`;
    updateSummary();
    return;
  }

  let html = '';
  S.days.forEach((day, di) => {
    const dayPg  = day.scenes.reduce((a,sc) => a + parsePages(sc.pages), 0);
    const dayMin = day.scenes.reduce((a,sc) => a + sceneTime(sc), 0);
    const castAll = [...new Set(day.scenes.flatMap(sc => sc.cast || []))].join(' · ');

    html += `
    <div class="day-block" id="db-${day.id}">
      <div class="day-header">
        <div class="day-num">SHOOT DAY ${day.dayNumber}</div>
        <input type="date" class="day-date-in"
          value="${esc(day.date || '')}"
          title="Override date"
          onchange="setDayDate('${day.id}',this.value)">
        <div class="day-meta">
          <span><strong>${day.scenes.length}</strong> scene${day.scenes.length!==1?'s':''}</span>
          <span><strong>${fmtPages(dayPg)}</strong> pages</span>
          <span><strong>${fmtTime(dayMin)}</strong> est.</span>
          ${di > 0
            ? `<button class="day-del-btn" onclick="askDelDay('${day.id}')">✕ Remove Day</button>`
            : ''}
        </div>
      </div>
      ${castAll ? `<div class="day-cast-line">Cast: ${esc(castAll)}</div>` : ''}
      ${day.scenes.length > 0 ? stripHeader() : ''}
      <div class="strips-container" id="sc-${day.id}" data-day="${day.id}">
        ${day.scenes.map(sc => stripHtml(sc)).join('')}
        ${day.scenes.length === 0 ? '<div class="drop-hint">No scenes — drop here or click Add Scene</div>' : ''}
      </div>
    </div>`;
  });

  el.innerHTML = html;
  initSortable();
  updateSummary();
  buildPrintHeader();
}

function stripHeader() {
  return `
  <div class="strip-header">
    <div class="sh-cell">#</div>
    <div class="sh-cell">INT/EXT</div>
    <div class="sh-cell">LOCATION</div>
    <div class="sh-cell">DESCRIPTION</div>
    <div class="sh-cell">D/N</div>
    <div class="sh-cell">PAGES</div>
    <div class="sh-cell">EST.</div>
    <div class="sh-cell">CAST</div>
    <div class="sh-cell"></div>
  </div>`;
}

function stripHtml(sc) {
  const colorObj = COLORS.find(c => c.name === sc.color) || COLORS[0];
  const pages = parsePages(sc.pages);
  const mins  = sceneTime(sc);
  const castHtml = (sc.cast||[]).map(c => `<span class="c-tag">${esc(c)}</span>`).join('');

  return `
  <div class="strip" data-id="${sc.id}">
    <div class="strip-tab" style="background:${colorObj.hex};"></div>
    <div class="sc sc-num">${esc(sc.sceneNumber||'?')}</div>
    <div class="sc sc-ie">${sc.ie||'INT'}</div>
    <div class="sc"><span class="sc-loc">${esc(sc.loc||'—')}</span></div>
    <div class="sc"><span class="sc-desc">${esc(sc.desc||'')}</span></div>
    <div class="sc sc-dn">${sc.dn||'DAY'}</div>
    <div class="sc sc-pg">${fmtPages(pages)||'—'}</div>
    <div class="sc sc-time">${fmtTime(mins)}</div>
    <div class="sc sc-cast">${castHtml}</div>
    <div class="sc sc-act">
      <button class="act-btn" onclick="openEdit('${sc.id}')" title="Edit">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="act-btn del" onclick="askDelScene('${sc.id}')" title="Delete">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  </div>`;
}

/* ───────────────────────────────────────────
   SUMMARY BAR
─────────────────────────────────────────── */
function updateSummary() {
  const days   = S.days.length;
  const scenes = S.days.reduce((a,d) => a + d.scenes.length, 0);
  const pages  = S.days.reduce((a,d) => a + d.scenes.reduce((b,sc) => b + parsePages(sc.pages), 0), 0);
  const mins   = S.days.reduce((a,d) => a + d.scenes.reduce((b,sc) => b + sceneTime(sc), 0), 0);
  document.getElementById('s-days').textContent  = days   || '—';
  document.getElementById('s-scenes').textContent= scenes || '—';
  document.getElementById('s-pages').textContent = pages  ? fmtPages(pages) : '—';
  document.getElementById('s-time').textContent  = mins   ? fmtTime(mins)   : '—';
}

/* ───────────────────────────────────────────
   DRAG AND DROP
─────────────────────────────────────────── */
function initSortable() {
  S.days.forEach(day => {
    const el = document.getElementById(`sc-${day.id}`);
    if (!el || el._sortable) return;
    el._sortable = Sortable.create(el, {
      group: 'strips',
      animation: 140,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      dragClass: 'sortable-drag',
      onEnd: onDrop,
    });
  });
}

function onDrop() {
  /* Rebuild state from current DOM order */
  S.days.forEach(day => {
    const cont = document.getElementById(`sc-${day.id}`);
    if (!cont) return;
    const allScenes = S.days.flatMap(d => d.scenes);
    const ids = [...cont.querySelectorAll('.strip')].map(el => el.dataset.id);
    day.scenes = ids.map(id => allScenes.find(sc => sc.id === id)).filter(Boolean);
  });
  save();
  render();
}

/* ───────────────────────────────────────────
   DAY MANAGEMENT
─────────────────────────────────────────── */
function addDay() {
  S.days.push({ id: uid(), dayNumber: S.days.length + 1, date: '', scenes: [] });
  renumDays();
  save(); render();
  /* scroll to new day */
  const last = S.days[S.days.length - 1];
  setTimeout(() => {
    const el = document.getElementById(`db-${last.id}`);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 80);
}

function renumDays() { S.days.forEach((d,i) => d.dayNumber = i + 1); }

function setDayDate(dayId, date) {
  const d = S.days.find(x => x.id === dayId);
  if (d) { d.date = date; save(); }
}

function askDelDay(dayId) {
  const d = S.days.find(x => x.id === dayId);
  if (!d) return;
  openModal(
    'REMOVE DAY BREAK?',
    d.scenes.length
      ? `Shoot Day ${d.dayNumber} has ${d.scenes.length} scene${d.scenes.length!==1?'s':''}.  They will be moved to the previous day.`
      : `Remove Shoot Day ${d.dayNumber}?`,
    () => delDay(dayId)
  );
}

function delDay(dayId) {
  const i = S.days.findIndex(d => d.id === dayId);
  if (i < 0) return;
  if (i > 0 && S.days[i].scenes.length) {
    S.days[i-1].scenes.push(...S.days[i].scenes);
  }
  S.days.splice(i, 1);
  renumDays();
  save(); render();
}

/* ───────────────────────────────────────────
   PANEL — OPEN / CLOSE
─────────────────────────────────────────── */
function openPanel(dayId) {
  editId = null; editDayId = dayId || null;
  document.getElementById('panel-title').textContent = 'ADD SCENE';
  clearForm();
  populateDaySel(dayId);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  setTimeout(() => document.getElementById('f-num').focus(), 300);
}

function openEdit(sceneId) {
  const { day, scene } = findScene(sceneId);
  if (!scene) return;

  editId = sceneId; editDayId = day.id;
  document.getElementById('panel-title').textContent = 'EDIT SCENE';

  document.getElementById('f-num').value   = scene.sceneNumber || '';
  document.getElementById('f-loc').value   = scene.loc || '';
  document.getElementById('f-desc').value  = scene.desc || '';
  document.getElementById('f-pages').value = scene.pages || '';

  /* Pre-fill time: stored override, or auto-calc */
  const ov = parseTime(scene.timeOverride);
  document.getElementById('f-time').value = ov > 0
    ? scene.timeOverride
    : (parsePages(scene.pages) > 0 ? fmtTime(pagesMin(parsePages(scene.pages))) : '');

  fCast  = [...(scene.cast||[])];
  fIE    = scene.ie    || 'INT';
  fDN    = scene.dn    || 'DAY';
  fColor = scene.color || 'White';

  refreshIE(); refreshDN();
  renderCastPills();
  renderColors();
  populateDaySel(day.id);

  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closePanel();
}

/* ───────────────────────────────────────────
   PANEL — FORM
─────────────────────────────────────────── */
function clearForm() {
  ['f-num','f-loc','f-desc','f-pages','f-time'].forEach(id => {
    document.getElementById(id).value = '';
  });
  fCast  = []; fIE = 'INT'; fDN = 'DAY'; fColor = 'White';
  refreshIE(); refreshDN();
  renderCastPills();
  renderColors();
}

function setIE(v) { fIE = v; refreshIE(); autoColor(); }
function setDN(v) { fDN = v; refreshDN(); autoColor(); }

function refreshIE() {
  document.querySelectorAll('#tg-ie .tog').forEach(b => {
    b.classList.toggle('on', b.textContent.trim() === fIE);
  });
}
function refreshDN() {
  document.querySelectorAll('#tg-dn .tog').forEach(b => {
    b.classList.toggle('on', b.textContent.trim() === fDN);
  });
}

function autoColor() {
  const key = `${fIE}-${fDN}`;
  fColor = AUTO_COLOR[key] || 'White';
  renderColors();
}

function autoFillTime() {
  const pages = parsePages(document.getElementById('f-pages').value);
  if (pages > 0) {
    document.getElementById('f-time').value = fmtTime(pagesMin(pages));
  }
}

/* ───────────────────────────────────────────
   COLOR SWATCHES
─────────────────────────────────────────── */
function renderColors() {
  document.getElementById('color-grid').innerHTML = COLORS.map(c => `
    <button class="color-swatch ${fColor===c.name?'sel':''}"
      style="background:${c.hex};"
      onclick="pickColor('${c.name}')"
      title="${c.label}">
      <span class="tip">${c.label}</span>
    </button>`).join('');
}

function pickColor(name) { fColor = name; renderColors(); }

/* ───────────────────────────────────────────
   CAST
─────────────────────────────────────────── */
function castKey(e) {
  const inp = e.target;
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const v = inp.value.replace(/,/g,'').trim();
    if (v && !fCast.includes(v)) { fCast.push(v); renderCastPills(); }
    inp.value = '';
  } else if (e.key === 'Backspace' && inp.value === '' && fCast.length) {
    fCast.pop(); renderCastPills();
  }
}

function removeCast(i) { fCast.splice(i,1); renderCastPills(); }

function renderCastPills() {
  document.getElementById('cast-pills').innerHTML = fCast.map((c,i) => `
    <span class="cast-pill">
      ${esc(c)}
      <button onclick="removeCast(${i})">×</button>
    </span>`).join('');
}

/* ───────────────────────────────────────────
   LOCATION AUTOCOMPLETE
─────────────────────────────────────────── */
function onLocInput(val) {
  const drop = document.getElementById('ac-drop');
  if (!val) { drop.style.display='none'; return; }
  const matches = allLocations().filter(l =>
    l.toLowerCase().includes(val.toLowerCase()) && l !== val
  );
  if (!matches.length) { drop.style.display='none'; return; }
  drop.innerHTML = matches.map(l =>
    `<div class="ac-item" onmousedown="pickLoc('${esc(l)}')">${esc(l)}</div>`
  ).join('');
  drop.style.display = 'block';
}

function pickLoc(l) {
  document.getElementById('f-loc').value = l;
  document.getElementById('ac-drop').style.display = 'none';
}

function closeAC(ms) {
  setTimeout(() => { document.getElementById('ac-drop').style.display='none'; }, ms);
}

/* ───────────────────────────────────────────
   DAY SELECT
─────────────────────────────────────────── */
function populateDaySel(selId) {
  const sel = document.getElementById('f-day-sel');
  if (S.days.length === 0) {
    sel.innerHTML = '<option value="">Day 1 (will be auto-created)</option>';
    return;
  }
  sel.innerHTML = S.days.map(d => `
    <option value="${d.id}" ${d.id===selId?'selected':''}>
      Shoot Day ${d.dayNumber}${d.date?' — '+d.date:''} (${d.scenes.length} scenes)
    </option>`).join('');
}

/* ───────────────────────────────────────────
   SAVE SCENE
─────────────────────────────────────────── */
function saveScene() {
  const sceneNumber = document.getElementById('f-num').value.trim();
  if (!sceneNumber) {
    document.getElementById('f-num').style.borderColor = 'var(--red)';
    document.getElementById('f-num').focus();
    return;
  }
  document.getElementById('f-num').style.borderColor = '';

  const loc   = document.getElementById('f-loc').value.trim();
  const desc  = document.getElementById('f-desc').value.trim();
  const pages = document.getElementById('f-pages').value.trim();
  const time  = document.getElementById('f-time').value.trim();
  const daySelId = document.getElementById('f-day-sel').value;

  /* Auto-create first day if needed */
  if (S.days.length === 0) {
    S.days.push({ id: uid(), dayNumber: 1, date:'', scenes:[] });
  }

  const targetDay = S.days.find(d => d.id === daySelId) || S.days[0];
  if (!targetDay) return;

  /* Check if timeOverride is different from auto-calculated */
  const autoTime = fmtTime(pagesMin(parsePages(pages)));
  const timeOverride = (time && time !== autoTime) ? time : '';

  if (editId) {
    /* UPDATE */
    const { day: fromDay, scene } = findScene(editId);
    if (!scene) return;

    Object.assign(scene, {
      sceneNumber, loc, desc, pages, timeOverride,
      ie: fIE, dn: fDN, cast: [...fCast], color: fColor,
    });

    /* Move to different day? */
    if (fromDay.id !== targetDay.id) {
      fromDay.scenes = fromDay.scenes.filter(s => s.id !== editId);
      targetDay.scenes.push(scene);
    }
  } else {
    /* ADD */
    targetDay.scenes.push({
      id: uid(), sceneNumber, loc, desc, pages, timeOverride,
      ie: fIE, dn: fDN, cast: [...fCast], color: fColor,
    });
  }

  closePanel();
  save(); render();
}

/* ───────────────────────────────────────────
   FIND SCENE
─────────────────────────────────────────── */
function findScene(id) {
  for (const day of S.days) {
    const scene = day.scenes.find(s => s.id === id);
    if (scene) return { day, scene };
  }
  return { day: null, scene: null };
}

/* ───────────────────────────────────────────
   DELETE SCENE
─────────────────────────────────────────── */
function askDelScene(id) {
  openModal(
    'DELETE SCENE?',
    'This strip will be permanently removed from the schedule.',
    () => delScene(id)
  );
}

function delScene(id) {
  S.days.forEach(d => { d.scenes = d.scenes.filter(s => s.id !== id); });
  save(); render();
}

/* ───────────────────────────────────────────
   MODAL
─────────────────────────────────────────── */
function openModal(title, body, onOk) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent  = body;
  document.getElementById('modal-ok').onclick = () => { onOk(); closeModal(); };
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

/* ───────────────────────────────────────────
   NEW PROJECT
─────────────────────────────────────────── */
function askNewProject() {
  openModal(
    'START NEW PROJECT?',
    'All current schedule data will be cleared. This cannot be undone.',
    newProject
  );
}

function newProject() {
  S = { project:{name:'',director:'',firstAD:'',startDate:''}, days:[] };
  save(); loadProjHeader(); render();
  document.title = 'One-Liner Builder — How It\'s Filmed';
}

/* ───────────────────────────────────────────
   PRINT
─────────────────────────────────────────── */
function buildPrintHeader() {
  const p = S.project;
  const totalPages  = S.days.reduce((a,d) => a + d.scenes.reduce((b,sc) => b + parsePages(sc.pages), 0), 0);
  const totalScenes = S.days.reduce((a,d) => a + d.scenes.length, 0);
  const today = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  document.getElementById('print-header').innerHTML = `
    <div class="print-title">${p.name || 'UNTITLED PROJECT'} — ONE-LINER SCHEDULE</div>
    <hr class="print-rule">
    <div class="print-meta">
      <span><strong>Director:</strong> ${esc(p.director)||'—'}</span>
      <span><strong>1st AD:</strong> ${esc(p.firstAD)||'—'}</span>
      <span><strong>Shoot Start:</strong> ${esc(p.startDate)||'—'}</span>
      <span><strong>Printed:</strong> ${today}</span>
      <span><strong>Total Scenes:</strong> ${totalScenes}</span>
      <span><strong>Total Pages:</strong> ${fmtPages(totalPages)}</span>
      <span><strong>Shoot Days:</strong> ${S.days.length}</span>
    </div>
    <hr class="print-rule" style="margin-top:10pt;">`;
}

function printOneLiner() {
  buildPrintHeader();
  window.print();
}

/* ───────────────────────────────────────────
   KEYBOARD SHORTCUTS
─────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePanel(); closeModal(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    if (document.getElementById('panel').classList.contains('open')) saveScene();
  }
});

/* ───────────────────────────────────────────
   INIT
─────────────────────────────────────────── */
(function init() {
  load();
  loadProjHeader();
  renderColors();
  render();
})();
</script>
</body>
</html>
