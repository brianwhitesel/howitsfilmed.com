<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Grade Notes — How It's Filmed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --bg:#FAFAFA;--bg2:#FFFFFF;--bg3:#F2F2F2;--bg4:#EBEBEB;
  --border:#E0E0E0;--border2:#D0D0D0;
  --accent:#FF3333;--accent2:#CC2020;
  --text:#1A1A1A;--text2:#555555;--text3:#999999;
  --logo-ink:#1a1a1a;--logo-bg:#FAFAFA;
  --font-ui:'Inter',sans-serif;--font-head:'Bebas Neue',sans-serif;
}
[data-theme="dark"]{
  --bg:#1A1A1A;--bg2:#212121;--bg3:#2a2a2a;--bg4:#2f2f2f;
  --border:#252525;--border2:#2e2e2e;
  --accent:#FF3333;--accent2:#CC2020;
  --text:#FFFFFF;--text2:#9a9490;--text3:#5a5650;
  --logo-ink:#FFFFFF;--logo-bg:#1A1A1A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;min-height:100vh;}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 48px;display:flex;align-items:center;gap:8px;}
.toolbar-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--text2);font-family:var(--font-ui);font-size:11px;font-weight:500;letter-spacing:0.06em;padding:5px 12px;cursor:pointer;border-radius:2px;transition:all 0.15s;white-space:nowrap;}
.toolbar-btn:hover{border-color:var(--text3);color:var(--text);}
.toolbar-btn.save-btn{border-color:var(--accent2);color:var(--accent);}
.toolbar-btn.save-btn:hover{background:rgba(255,51,51,0.08);}
.theme-toggle{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--text2);font-size:14px;padding:4px 10px;cursor:pointer;border-radius:2px;transition:all 0.15s;line-height:1;font-family:var(--font-ui,sans-serif);}
.theme-toggle:hover{border-color:var(--accent2);color:var(--accent);}
[data-theme="dark"] .theme-icon::before{content:"\2600";}
[data-theme="light"] .theme-icon::before{content:"\1F319";}
.accent-rule{height:3px;background:var(--accent);width:100%;}
.page{max-width:1200px;margin:0 auto;padding:32px 48px;}
@media(max-width:600px){.page{padding:16px 12px;}.toolbar{padding:6px 12px;}}
.doc-header{display:flex;align-items:flex-start;gap:24px;margin-bottom:24px;flex-wrap:wrap;}
.doc-header-right{flex:1;min-width:200px;}
.doc-title{font-family:var(--font-head);font-size:36px;letter-spacing:0.04em;color:var(--text);line-height:1;}
.doc-subtitle{font-size:11px;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase;margin-top:2px;}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;margin-top:12px;}
@media(max-width:600px){.meta-grid{grid-template-columns:1fr;}}
.meta-field{display:flex;flex-direction:column;gap:2px;}
.meta-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);}
.meta-input{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:var(--font-ui);font-size:13px;padding:3px 0;outline:none;width:100%;}
.meta-input:focus{border-bottom-color:var(--accent);}
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;align-items:center;}
.filter-label{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-right:4px;}
.filter-pill{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--font-ui);font-size:11px;font-weight:500;padding:4px 14px;border-radius:20px;cursor:pointer;transition:all 0.15s;}
.filter-pill:hover{border-color:var(--border2);color:var(--text);}
.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.grade-table-wrap{overflow-x:auto;margin-bottom:16px;}
.grade-table{width:100%;border-collapse:collapse;min-width:900px;}
.grade-table th{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);padding:8px 8px;text-align:left;background:var(--bg2);border-bottom:2px solid var(--border);white-space:nowrap;}
.grade-table td{padding:6px 7px;border-bottom:1px solid var(--border);background:var(--bg2);vertical-align:middle;}
.grade-table tr:hover td{background:var(--bg3);}
.cell-input{background:transparent;border:none;color:var(--text);font-family:var(--font-ui);font-size:12px;padding:2px 3px;outline:none;width:100%;min-width:50px;}
.cell-input:focus{background:var(--bg4);border-radius:2px;}
.status-select{background:transparent;border:none;font-family:var(--font-ui);font-size:11px;font-weight:600;padding:3px 6px;border-radius:12px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;}
.status-graded{background:rgba(56,161,105,0.15);color:#276749;}
.status-inprogress{background:rgba(214,158,46,0.15);color:#975a16;}
.status-locked{background:rgba(49,130,206,0.15);color:#2c5282;}
.status-flagged{background:rgba(229,62,62,0.15);color:#9b2c2c;}
[data-theme="dark"] .status-graded{background:rgba(56,161,105,0.25);color:#68d391;}
[data-theme="dark"] .status-inprogress{background:rgba(214,158,46,0.25);color:#f6e05e;}
[data-theme="dark"] .status-locked{background:rgba(49,130,206,0.25);color:#90cdf4;}
[data-theme="dark"] .status-flagged{background:rgba(229,62,62,0.25);color:#fc8181;}
.del-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 4px;}
.del-btn:hover{color:var(--accent);}
.add-row-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px dashed var(--border2);color:var(--text3);font-family:var(--font-ui);font-size:11px;padding:5px 12px;cursor:pointer;border-radius:2px;margin-top:6px;transition:all 0.15s;}
.add-row-btn:hover{border-color:var(--accent);color:var(--accent);}
.page-footer{margin-top:48px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
</style>
</head>
<body>
<div class="toolbar">
  <button class="toolbar-btn save-btn" onclick="saveFile()">&#8595; Save File</button>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><span class="theme-icon"></span></button>
</div>
<div class="accent-rule"></div>
<div class="page">
  <div class="doc-header">
    <svg class="hif-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="15 22 640 268" style="width:240px;height:auto;display:block;" aria-label="How It's Filmed">
      <style>.logo-ink{fill:var(--logo-ink,#1a1a1a)}.logo-dot{fill:#f33}.logo-bg-counter{fill:var(--logo-bg,#fafafa)}</style>

    </svg>
    <div class="doc-header-right">
      <div class="doc-title">Color Grade Notes</div>
      <div class="doc-subtitle">Shot-by-Shot Color Reference</div>
      <div class="meta-grid">
        <div class="meta-field"><span class="meta-label">Project</span><input class="meta-input" type="text" placeholder="Project Name"></div>
        <div class="meta-field"><span class="meta-label">Colorist</span><input class="meta-input" type="text" placeholder="Colorist Name"></div>
        <div class="meta-field"><span class="meta-label">Date</span><input class="meta-input" type="text" placeholder="MM/DD/YYYY"></div>
        <div class="meta-field"><span class="meta-label">Software / NLE</span><input class="meta-input" type="text" placeholder="DaVinci Resolve 19"></div>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-pill active" data-filter="all">All</button>
    <button class="filter-pill" data-filter="Graded">Graded</button>
    <button class="filter-pill" data-filter="In Progress">In Progress</button>
    <button class="filter-pill" data-filter="Locked">Locked</button>
    <button class="filter-pill" data-filter="Flagged">Flagged</button>
  </div>

  <div class="grade-table-wrap">
    <table class="grade-table" id="grade-table">
      <thead>
        <tr>
          <th>Scene</th><th>Shot</th><th>Base LUT</th><th>Temp</th><th>Tint</th>
          <th>Exposure</th><th>Contrast</th><th>Mood / Description</th><th>Ref. Frame</th><th>Status</th><th></th>
        </tr>
      </thead>
      <tbody id="grade-tbody"></tbody>
    </table>
  </div>
  <button class="add-row-btn" id="add-shot-btn">+ Add Shot</button>

  <div class="page-footer">
    <div style="font-size:10px;color:var(--text3);letter-spacing:0.1em;"><span style="color:var(--accent);">How It's Filmed</span> — howitsfilmed.com</div>
    <div style="font-size:10px;color:var(--text3);">COLOR GRADE NOTES &nbsp;·&nbsp; howitsfilmed.com</div>
  </div>
</div>

<script>
(function(){
  function toggleTheme(){var h=document.documentElement;var d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');}
  window.toggleTheme=toggleTheme;
  document.documentElement.setAttribute('data-theme','light');
})();

var seedRows=[
  {scene:'1',shot:'A001',lut:'Kodak 2383',temp:'+150K',tint:'+2',exp:'+0.3',contrast:'+15',mood:'Warm golden hour, nostalgic feel',ref:'Frame 01:23:45',status:'Graded'},
  {scene:'1',shot:'A002',lut:'Kodak 2383',temp:'+150K',tint:'+2',exp:'+0.1',contrast:'+10',mood:'Match cut to hero wide — keep warmth',ref:'Frame 01:24:02',status:'Graded'},
  {scene:'2',shot:'B001',lut:'Fuji 3510',temp:'-100K',tint:'-5',exp:'-0.2',contrast:'+20',mood:'Cool, sterile hospital interior',ref:'Frame 02:11:08',status:'Locked'},
  {scene:'2',shot:'B002',lut:'Fuji 3510',temp:'-80K',tint:'-3',exp:'0',contrast:'+18',mood:'Slightly warmer to show character warmth',ref:'Frame 02:13:55',status:'In Progress'},
  {scene:'3',shot:'C001',lut:'Flat Log Neutral',temp:'+50K',tint:'0',exp:'+0.5',contrast:'-5',mood:'Overexposed dreamy — blown highlights intentional',ref:'Frame 03:02:10',status:'In Progress'},
  {scene:'4',shot:'D001',lut:'Custom — Teal/Orange',temp:'+200K',tint:'+8',exp:'-0.4',contrast:'+30',mood:'High contrast cinematic action — moody shadows',ref:'Frame 04:00:18',status:'Flagged'}
];

var statusMap={
  'Graded':'status-graded',
  'In Progress':'status-inprogress',
  'Locked':'status-locked',
  'Flagged':'status-flagged'
};

function applyStatusClass(sel){
  sel.className='status-select '+( statusMap[sel.value]||'' );
}

function makeRow(d){
  var tr=document.createElement('tr');
  function ci(val,ph){return '<input class="cell-input" type="text" value="'+val+'" placeholder="'+ph+'">';}
  tr.innerHTML=
    '<td>'+ci(d.scene,'1')+'</td>'+
    '<td>'+ci(d.shot,'A001')+'</td>'+
    '<td>'+ci(d.lut,'LUT Name')+'</td>'+
    '<td>'+ci(d.temp,'±K')+'</td>'+
    '<td>'+ci(d.tint,'±')+'</td>'+
    '<td>'+ci(d.exp,'±EV')+'</td>'+
    '<td>'+ci(d.contrast,'±')+'</td>'+
    '<td style="min-width:160px">'+ci(d.mood,'Mood description')+'</td>'+
    '<td>'+ci(d.ref,'TC or desc.')+'</td>'+
    '<td><select class="status-select"><option>Graded</option><option>In Progress</option><option>Locked</option><option>Flagged</option></select></td>'+
    '<td><button class="del-btn">&#x2715;</button></td>';
  var sel=tr.querySelector('select');
  sel.value=d.status||'Graded';
  applyStatusClass(sel);
  sel.addEventListener('change',function(){applyStatusClass(sel);});
  tr.querySelector('.del-btn').addEventListener('click',function(){tr.remove();});
  return tr;
}

var tbody=document.getElementById('grade-tbody');
seedRows.forEach(function(d){tbody.appendChild(makeRow(d));});

document.getElementById('add-shot-btn').addEventListener('click',function(){
  tbody.appendChild(makeRow({scene:'',shot:'',lut:'',temp:'',tint:'',exp:'',contrast:'',mood:'',ref:'',status:'In Progress'}));
});

var pills=document.querySelectorAll('.filter-pill');
pills.forEach(function(pill){
  pill.addEventListener('click',function(){
    pills.forEach(function(p){p.classList.remove('active');});
    pill.classList.add('active');
    var f=pill.dataset.filter;
    var rows=tbody.querySelectorAll('tr');
    rows.forEach(function(row){
      if(f==='all'){row.style.display='';}
      else{
        var sel=row.querySelector('select');
        row.style.display=(sel&&sel.value===f)?'':'none';
      }
    });
  });
});

function saveFile(){
  var doctype='<!DOCTYPE html>';
  var clone=document.documentElement.cloneNode(true);
  var liveInputs=Array.from(document.querySelectorAll('input,select,textarea'));
  var cloneInputs=Array.from(clone.querySelectorAll('input,select,textarea'));
  liveInputs.forEach(function(live,i){
    var cl=cloneInputs[i];if(!cl)return;
    if(live.type==='checkbox'){if(live.checked)cl.setAttribute('checked','checked');else cl.removeAttribute('checked');}
    else if(live.tagName==='SELECT'){Array.from(cl.options).forEach(function(opt,j){if(live.options[j]&&live.options[j].selected)opt.setAttribute('selected','selected');else opt.removeAttribute('selected');});}
    else{cl.setAttribute('value',live.value);}
  });
  var toolbarEl=clone.querySelector('.toolbar');if(toolbarEl)toolbarEl.remove();
  var html=doctype+'\n'+clone.outerHTML;
  var blob=new Blob([html],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='HIF-Color-Grade-Notes.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
</script>
</body>
</html>
