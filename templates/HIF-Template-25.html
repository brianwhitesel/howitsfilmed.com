<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music &amp; Licensing Tracker — How It's Filmed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  --bg: #FAFAFA; --bg2: #FFFFFF; --bg3: #F2F2F2; --bg4: #EBEBEB;
  --border: #E0E0E0; --border2: #D0D0D0;
  --accent: #FF3333; --accent2: #CC2020;
  --text: #1A1A1A; --text2: #555555; --text3: #999999;
  --logo-ink: #1a1a1a; --logo-bg: #FAFAFA;
  --font-ui: 'Inter', sans-serif; --font-head: 'Bebas Neue', sans-serif;
}
[data-theme="dark"] {
  --bg: #1A1A1A; --bg2: #212121; --bg3: #2a2a2a; --bg4: #2f2f2f;
  --border: #252525; --border2: #2e2e2e;
  --accent: #FF3333; --accent2: #CC2020;
  --text: #FFFFFF; --text2: #9a9490; --text3: #5a5650;
  --logo-ink: #FFFFFF; --logo-bg: #1A1A1A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-ui); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

.toolbar { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.toolbar-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-size: 12px; font-family: var(--font-ui); padding: 5px 12px; cursor: pointer; border-radius: 2px; transition: all 0.15s; white-space: nowrap; }
.toolbar-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.toolbar-btn:disabled { opacity: 0.4; cursor: default; }
.toolbar-btn.save-btn { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.toolbar-btn.save-btn:hover { background: var(--accent2); border-color: var(--accent2); }
.toolbar-divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.toolbar-shortcut { opacity: 0.6; font-size: 10px; }
.theme-toggle { margin-left: auto; background: transparent; border: 1px solid var(--border); color: var(--text2); font-size: 14px; padding: 4px 10px; cursor: pointer; border-radius: 2px; transition: all 0.15s; line-height: 1; }
.theme-toggle:hover { border-color: var(--accent2); color: var(--accent); }
[data-theme="dark"] .theme-icon::before { content: "\2600"; }
[data-theme="light"] .theme-icon::before { content: "\1F319"; }
.undo-indicator { font-size: 11px; color: var(--text3); min-width: 80px; }
.accent-rule { height: 2px; background: linear-gradient(90deg, var(--accent) 0%, transparent 60%); }

.page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; padding: 24px 32px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.brand-block { display: flex; flex-direction: column; gap: 6px; }
.doc-title { font-family: var(--font-head); font-size: 28px; letter-spacing: 0.05em; color: var(--text); line-height: 1; }
.doc-subtitle { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
.header-meta { display: flex; flex-direction: column; gap: 10px; min-width: 280px; }
.meta-row { display: flex; align-items: center; gap: 10px; }
.meta-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); min-width: 70px; text-align: right; }
.meta-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border2); color: var(--text); font-family: var(--font-ui); font-size: 13px; padding: 3px 4px; outline: none; transition: border-color 0.15s; }
.meta-input:focus { border-bottom-color: var(--accent); }

.project-strip { display: flex; gap: 0; background: var(--bg3); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.strip-cell { padding: 10px 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; }
.strip-cell:last-child { border-right: none; }
.strip-key { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
.strip-val { font-size: 18px; font-family: var(--font-head); letter-spacing: 0.05em; color: var(--text); }

.page-body { padding: 24px 32px; overflow-x: auto; }

.music-table-wrap { overflow-x: auto; }
.music-table { width: 100%; border-collapse: collapse; min-width: 1200px; }
.music-table th { background: var(--bg3); border: 1px solid var(--border); padding: 8px 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); text-align: left; white-space: nowrap; }
.music-table th.center { text-align: center; }
.music-table td { border: 1px solid var(--border); padding: 5px 7px; vertical-align: middle; background: var(--bg2); }
.music-table tr:hover td { background: var(--bg3); }
.music-table tr.totals-row td { background: var(--bg3); border-top: 2px solid var(--border2); font-weight: 600; }
.num-cell { text-align: center; font-size: 12px; font-weight: 700; color: var(--text3); width: 32px; }

.tbl-input { background: transparent; border: none; color: var(--text); font-family: var(--font-ui); font-size: 12px; padding: 4px 5px; outline: none; width: 100%; }
.tbl-input:focus { background: var(--bg4); border-radius: 2px; }

.cost-wrap { display: flex; align-items: center; gap: 2px; }
.cost-symbol { font-size: 11px; color: var(--text3); font-weight: 600; flex-shrink: 0; }
.cost-input { min-width: 60px; }

/* Status badge */
.status-badge { cursor: pointer; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; user-select: none; white-space: nowrap; display: inline-block; }
.status-badge[data-status="Active"] { background: rgba(0,200,80,0.12); color: #008040; }
.status-badge[data-status="Expired"] { background: rgba(255,51,51,0.12); color: #cc0000; }
.status-badge[data-status="Pending"] { background: rgba(255,200,0,0.15); color: #cc9900; }

.del-btn { background: transparent; border: 1px solid transparent; color: var(--text3); font-size: 14px; width: 26px; height: 26px; cursor: pointer; border-radius: 2px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.del-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,51,51,0.08); }

.add-row-btn { margin-top: 12px; display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border: 2px dashed var(--border2); border-radius: 2px; background: transparent; color: var(--text3); font-family: var(--font-ui); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; letter-spacing: 0.06em; }
.add-row-btn:hover { border-color: var(--accent); color: var(--accent); }

.totals-summary { display: flex; gap: 0; }
.tot-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
.tot-val { font-size: 16px; font-family: var(--font-head); letter-spacing: 0.04em; color: var(--text); }

.page-footer { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; border-top: 1px solid var(--border); margin-top: 8px; color: var(--text3); font-size: 11px; }
.footer-dot { color: var(--accent); }

@media (max-width: 600px) { .page-body { padding: 12px; } .page-header { padding: 16px; } .header-meta { min-width: 100%; } }
@media print { .toolbar { display: none; } .accent-rule { display: none; } .add-row-btn { display: none; } .del-btn { display: none; } }
</style>
</head>

<script>
(function() {
  function toggleTheme() {
    var html = document.documentElement;
    html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  }
  window.toggleTheme = toggleTheme;

  var history = [], future = [], isBusy = false, rowCounter = 0;
  var STATUSES = ['Active', 'Expired', 'Pending'];
  var PLATFORMS = ['Artlist','Musicbed','Epidemic Sound','Directly Licensed','Original','Other'];
  var LICENSE_TYPES = ['Standard','Extended','Broadcast','Sync','Royalty-Free','Custom'];

  function makeOptions(arr, selected) {
    return arr.map(function(v) { return '<option' + (v === selected ? ' selected' : '') + '>' + v + '</option>'; }).join('');
  }

  function cycleStatus(badge) {
    var idx = STATUSES.indexOf(badge.dataset.status);
    var next = STATUSES[(idx + 1) % STATUSES.length];
    badge.dataset.status = next;
    badge.textContent = next;
    updateStats();
    pushState();
  }

  function updateStats() {
    var rows = document.querySelectorAll('#music-tbody tr');
    var total = rows.length, active = 0, expired = 0, cost = 0;
    rows.forEach(function(tr) {
      var badge = tr.querySelector('.status-badge');
      if (badge) {
        if (badge.dataset.status === 'Active') active++;
        if (badge.dataset.status === 'Expired') expired++;
      }
      var costEl = tr.querySelector('[data-field="cost"]');
      if (costEl) { var v = parseFloat(costEl.value); if (!isNaN(v)) cost += v; }
    });
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-licensed').textContent = active;
    document.getElementById('stat-expired').textContent = expired;
    document.getElementById('stat-cost').textContent = '$' + cost.toFixed(2);
  }

  function buildRow(num, data) {
    data = data || {};
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="num-cell">' + num + '</td>' +
      '<td><input class="tbl-input" data-field="track" type="text" value="' + (data.track||'') + '" placeholder="Track name" autocomplete="off" style="min-width:130px"></td>' +
      '<td><input class="tbl-input" data-field="artist" type="text" value="' + (data.artist||'') + '" placeholder="Artist" autocomplete="off" style="min-width:100px"></td>' +
      '<td><input class="tbl-input" data-field="album" type="text" value="' + (data.album||'') + '" placeholder="Album" autocomplete="off" style="min-width:100px"></td>' +
      '<td><select class="tbl-input" data-field="platform" style="min-width:120px">' + makeOptions(PLATFORMS, data.platform) + '</select></td>' +
      '<td><select class="tbl-input" data-field="license" style="min-width:110px">' + makeOptions(LICENSE_TYPES, data.license) + '</select></td>' +
      '<td><input class="tbl-input" data-field="usedin" type="text" value="' + (data.usedin||'') + '" placeholder="Project / video" autocomplete="off" style="min-width:110px"></td>' +
      '<td><div class="cost-wrap"><span class="cost-symbol">$</span><input class="tbl-input cost-input" data-field="cost" type="number" value="' + (data.cost||'') + '" placeholder="0.00" min="0" step="0.01"></div></td>' +
      '<td><input class="tbl-input" data-field="expiry" type="date" value="' + (data.expiry||'') + '" style="min-width:120px"></td>' +
      '<td style="text-align:center"><span class="status-badge" data-status="' + (data.status||'Active') + '">' + (data.status||'Active') + '</span></td>' +
      '<td style="text-align:center"><button class="del-btn" onclick="deleteRow(this)" title="Delete">×</button></td>';
    tr.querySelector('.status-badge').addEventListener('click', function() { cycleStatus(this); });
    tr.querySelectorAll('input, select').forEach(function(el) {
      el.addEventListener('change', function() { updateStats(); pushState(); });
      if (el.type === 'text' || el.type === 'number') el.addEventListener('blur', function() { updateStats(); pushState(); });
    });
    return tr;
  }

  function addRow(data) {
    rowCounter++;
    var tr = buildRow(rowCounter, data);
    document.getElementById('music-tbody').appendChild(tr);
    updateStats();
    pushState();
  }

  function deleteRow(btn) {
    btn.closest('tr').remove();
    renumber();
    updateStats();
    pushState();
  }

  function renumber() {
    document.querySelectorAll('#music-tbody tr').forEach(function(tr, i) {
      tr.querySelector('.num-cell').textContent = i + 1;
    });
  }

  window.addRow = addRow;
  window.deleteRow = deleteRow;

  function captureState() {
    var state = { rows: [] };
    document.querySelectorAll('#music-tbody tr').forEach(function(tr) {
      var row = { status: tr.querySelector('.status-badge').dataset.status };
      tr.querySelectorAll('[data-field]').forEach(function(el) { row[el.dataset.field] = el.value; });
      state.rows.push(row);
    });
    ['meta-project','meta-client','meta-editor'].forEach(function(id) {
      var el = document.getElementById(id); if (el) state[id] = el.value;
    });
    return JSON.stringify(state);
  }

  function restoreState(snapshot) {
    isBusy = true;
    var state = JSON.parse(snapshot);
    var tbody = document.getElementById('music-tbody');
    tbody.innerHTML = '';
    rowCounter = 0;
    state.rows.forEach(function(rowData, i) {
      rowCounter = i + 1;
      tbody.appendChild(buildRow(rowCounter, rowData));
    });
    ['meta-project','meta-client','meta-editor'].forEach(function(id) {
      var el = document.getElementById(id); if (el && state[id] !== undefined) el.value = state[id];
    });
    updateStats();
    isBusy = false;
  }

  var lastSnapshot = captureState();

  function pushState() {
    if (isBusy) return;
    var c = captureState();
    if (c === lastSnapshot) return;
    history.push(lastSnapshot); future = []; lastSnapshot = c; updateButtons();
  }

  function doUndo() {
    if (!history.length) return;
    future.push(captureState());
    var prev = history.pop(); lastSnapshot = prev; restoreState(prev); updateButtons();
  }

  function doRedo() {
    if (!future.length) return;
    history.push(captureState());
    var next = future.pop(); lastSnapshot = next; restoreState(next); updateButtons();
  }

  function updateButtons() {
    document.getElementById('btn-undo').disabled = !history.length;
    document.getElementById('btn-redo').disabled = !future.length;
    var ind = document.getElementById('undo-indicator');
    ind.textContent = history.length > 0 ? history.length + ' change' + (history.length > 1 ? 's' : '') : '';
  }

  window.doUndo = doUndo; window.doRedo = doRedo;

  document.addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
    if ((e.metaKey || e.ctrlKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); doRedo(); }
  });

  ['meta-project','meta-client','meta-editor'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.addEventListener('change', pushState); el.addEventListener('blur', pushState); }
  });

  function saveFile() {
    var blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'});
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'HIF-Template-25-MusicLicensingTracker.html'; a.click(); URL.revokeObjectURL(a.href);
  }
