<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Kickoff Checklist — How It's Filmed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue" rel="stylesheet">
<style>
:root,[data-theme="light"]{--bg:#FAFAFA;--bg2:#FFFFFF;--bg3:#F2F2F2;--bg4:#EBEBEB;--border:#E0E0E0;--accent:#FF3333;--accent2:#CC2020;--text:#1A1A1A;--text2:#555555;--text3:#999999;--logo-ink:#1a1a1a;--logo-bg:#FAFAFA;--font-ui:'Inter',sans-serif;--font-head:'Bebas Neue',sans-serif;}
[data-theme="dark"]{--bg:#1A1A1A;--bg2:#212121;--bg3:#2a2a2a;--bg4:#2f2f2f;--border:#252525;--accent:#FF3333;--accent2:#CC2020;--text:#FFFFFF;--text2:#9a9490;--text3:#5a5650;--logo-ink:#FFFFFF;--logo-bg:#1A1A1A;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);}body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:13px;line-height:1.5;min-height:100vh;}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 48px;display:flex;align-items:center;gap:8px;}
.toolbar-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--text2);font-family:var(--font-ui);font-size:11px;font-weight:500;letter-spacing:0.06em;padding:5px 12px;cursor:pointer;border-radius:2px;transition:all 0.15s;white-space:nowrap;}
.toolbar-btn:hover:not(:disabled){border-color:var(--text3);color:var(--text);}
.toolbar-btn:disabled{opacity:0.28;cursor:default;}
.toolbar-btn.save-btn{border-color:var(--accent2);color:var(--accent);}
.toolbar-btn.save-btn:hover{background:rgba(255,51,51,0.08);}
.toolbar-divider{width:1px;height:16px;background:var(--border);margin:0 4px;}
.toolbar-shortcut{font-size:9px;color:var(--text3);opacity:0.7;}
.undo-indicator{font-size:10px;color:var(--text3);margin-left:4px;opacity:0;transition:opacity 0.4s;}
.undo-indicator.flash{opacity:1;}
.theme-toggle{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--text2);font-size:14px;padding:4px 10px;cursor:pointer;border-radius:2px;transition:all 0.15s;line-height:1;}
.theme-toggle:hover{border-color:var(--accent2);color:var(--accent);}
[data-theme="dark"] .theme-icon::before{content:"\2600";}
[data-theme="light"] .theme-icon::before{content:"\1F319";}
.accent-rule{height:2px;background:linear-gradient(90deg,var(--accent) 0%,transparent 60%);}
.page-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:28px 48px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;}
.brand-block{display:flex;flex-direction:column;gap:4px;align-items:center;text-align:center;}
.doc-title{font-family:var(--font-head);font-size:32px;font-weight:400;color:var(--text);}
.doc-subtitle{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}
.header-meta{display:flex;flex-wrap:wrap;justify-content:center;gap:8px 24px;}
.meta-field{display:flex;flex-direction:column;gap:2px;align-items:center;}
.meta-label{font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text);}
.meta-value{font-size:12px;color:var(--text);background:transparent;border:none;border-bottom:1px solid var(--border);padding:2px 0;text-align:center;width:160px;outline:none;font-family:var(--font-ui);}
.meta-value:focus{border-bottom-color:var(--accent);}
.page-body{padding:32px 48px 56px;max-width:900px;margin:0 auto;}
/* Progress bar */
.progress-wrap{margin-bottom:28px;}
.progress-label{font-size:11px;color:var(--text3);margin-bottom:6px;display:flex;justify-content:space-between;}
.progress-bar{width:100%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);transition:width 0.4s;border-radius:3px;}
/* Sections */
.checklist-section{margin-bottom:28px;}
.cs-head{font-family:var(--font-head);font-size:14px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cs-count{font-family:var(--font-ui);font-size:10px;font-weight:500;color:var(--text3);}
/* Checklist items */
.cl-item{display:flex;align-items:flex-start;gap:14px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:2px;margin-bottom:6px;transition:all 0.15s;}
.cl-item.done{background:rgba(34,197,94,0.04);border-color:rgba(34,197,94,0.2);}
.cl-check{display:flex;align-items:center;padding-top:1px;flex-shrink:0;}
.cl-check input[type="checkbox"]{-webkit-appearance:none;appearance:none;width:16px;height:16px;border:1.5px solid var(--border);border-radius:2px;background:transparent;cursor:pointer;position:relative;transition:all 0.15s;}
.cl-check input[type="checkbox"]:checked{background:var(--accent);border-color:var(--accent);}
.cl-check input[type="checkbox"]:checked::after{content:'';position:absolute;left:3px;top:1px;width:6px;height:9px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(40deg);}
.cl-content{flex:1;}
.cl-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px;}
.cl-item.done .cl-title{text-decoration:line-through;color:var(--text3);}
.cl-meta{display:flex;gap:12px;flex-wrap:wrap;}
.cl-notes{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text2);font-family:var(--font-ui);font-size:11px;padding:2px 0;outline:none;flex:1;min-width:120px;}
.cl-notes:focus{border-bottom-color:var(--accent);}
.cl-date{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text3);font-family:var(--font-ui);font-size:11px;padding:2px 0;outline:none;width:100px;}
.cl-date:focus{border-bottom-color:var(--accent);}
.cl-date::placeholder{color:var(--text3);}
.page-footer{margin-top:40px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;}
.footer-brand{font-size:10px;color:var(--text3);}
.footer-brand span{color:var(--accent);}
@media print{.toolbar{display:none;}}
</style>
</head>
<body>

  <button class="toolbar-btn save-btn" onclick="saveFile()">↓ Save File</button>
  <div class="toolbar-divider"></div>
  <button class="theme-toggle" onclick="toggleTheme()"><span class="theme-icon"></span></button>
  <div class="toolbar-divider"></div>
  <button class="toolbar-btn" id="btn-undo" onclick="doUndo()" disabled>↩ Undo <span class="toolbar-shortcut">⌘Z</span></button>
  <button class="toolbar-btn" id="btn-redo" onclick="doRedo()" disabled>Redo ↪ <span class="toolbar-shortcut">⌘⇧Z</span></button>
  <span class="undo-indicator" id="undo-indicator"></span>
</div>

    <div class="doc-title">Project Kickoff Checklist</div>
    <div class="doc-subtitle">First-Week Production Setup</div>
  </div>
  <div class="header-meta">
    <div class="meta-field"><div class="meta-label">Project</div><input class="meta-value" type="text" placeholder="Project Title"></div>
    <div class="meta-field"><div class="meta-label">Client</div><input class="meta-value" type="text" placeholder="Client Name"></div>
    <div class="meta-field"><div class="meta-label">Producer</div><input class="meta-value" type="text" placeholder="Name"></div>
    <div class="meta-field"><div class="meta-label">Kickoff Date</div><input class="meta-value" type="text" placeholder="MM/DD/YYYY"></div>
  </div>
</div>

<div class="page-body">
  <div class="progress-wrap">
    <div class="progress-label"><span>Overall Progress</span><span id="progress-text">0 / 0 complete</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="checklist-container"></div>

  <div class="page-footer">
    <div class="footer-brand"><span>How It's Filmed</span> — howitsfilmed.com</div>
    <div>Project Kickoff Checklist</div>
  </div>
</div>

<script>
const CHECKLIST=[
  {section:'Contracts & Finance',items:['Contracts signed by all parties','Deposit / retainer received','Invoice sent to client','Project budget approved']},
  {section:'Project Setup',items:['Project folder created (local + cloud)','Project naming convention established','Call sheet template created','Creative brief / brief approved']},
  {section:'Locations',items:['Primary location confirmed','Location release / permit obtained','Scout visit completed','Parking / load-in logistics confirmed']},
  {section:'Talent & Crew',items:['On-camera talent confirmed','Crew confirmed (DP, sound, PA, etc.)','Hair / makeup / wardrobe confirmed','Day-of contact sheet distributed']},
  {section:'Equipment',items:['Camera package reserved / owned','Lighting package confirmed','Sound / audio package confirmed','B-roll / drone equipment confirmed','Equipment insurance verified']},
  {section:'Communication',items:['Kickoff call completed with client','Call sheet sent to all crew','Shot list reviewed and approved','Client expectations documented']]},
];

function updateProgress(){
  const all=document.querySelectorAll('.cl-check input[type="checkbox"]');
  const done=Array.from(all).filter(c=>c.checked).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=`${done} / ${all.length} complete`;
}

function buildChecklist(){
  const container=document.getElementById('checklist-container');
  CHECKLIST.forEach(s=>{
    const sec=document.createElement('div');
    sec.className='checklist-section';
    sec.innerHTML=`<div class="cs-head">${s.section}<span class="cs-count" id="cs-${s.section.replace(/\s/g,'_')}"></span></div>`;
    s.items.forEach((item,i)=>{
      const div=document.createElement('div');
      div.className='cl-item';
      const cbId=`cb_${s.section}_${i}`.replace(/\s/g,'_');
      div.innerHTML=`
        <div class="cl-check"><input type="checkbox" id="${cbId}" onchange="toggleItem(this)"></div>
        <div class="cl-content">
          <div class="cl-title">${item}</div>
          <div class="cl-meta">
            <input class="cl-notes" type="text" placeholder="Notes...">
            <input class="cl-date" type="text" placeholder="Date">
          </div>
        </div>`;
      sec.appendChild(div);
    });
    container.appendChild(sec);
  });
  document.querySelectorAll('.cl-check input,input[type="text"]').forEach(attachUndoListeners);
  updateProgress();
}

function toggleItem(cb){
  pushState();
  cb.closest('.cl-item').classList.toggle('done',cb.checked);
  updateProgress();
}

buildChecklist();

const MAX_STACK=50;let undoStack=[],redoStack=[],isRestoring=false,debounceTimer=null;
function captureState(){return JSON.stringify(Array.from(document.querySelectorAll('input[type="text"],input[type="checkbox"]')).map(e=>({v:e.type==='checkbox'?e.checked:e.value})));}
function restoreState(s){isRestoring=true;const d=JSON.parse(s),f=document.querySelectorAll('input[type="text"],input[type="checkbox"]');d.forEach((e,i)=>{const el=f[i];if(!el)return;el.type==='checkbox'?el.checked=e.v:el.value=e.v;if(el.type==='checkbox')el.closest('.cl-item')?.classList.toggle('done',e.v);});isRestoring=false;updateBtns();updateProgress();}
function pushState(s){if(isRestoring)return;undoStack.push(s||captureState());if(undoStack.length>MAX_STACK)undoStack.shift();redoStack=[];updateBtns();}
function doUndo(){if(!undoStack.length)return;redoStack.push(captureState());restoreState(undoStack.pop());flash('Undone');}
function doRedo(){if(!redoStack.length)return;undoStack.push(captureState());if(undoStack.length>MAX_STACK)undoStack.shift();restoreState(redoStack.pop());flash('Redone');}
function updateBtns(){document.getElementById('btn-undo').disabled=!undoStack.length;document.getElementById('btn-redo').disabled=!redoStack.length;}
function flash(m){const e=document.getElementById('undo-indicator');e.textContent=m;e.classList.add('flash');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('flash'),1200);}
function attachUndoListeners(el){if(el.type==='checkbox'){el.addEventListener('change',()=>{if(!isRestoring)pushState();});}else{el.addEventListener('focus',()=>{if(!isRestoring)el._sf=captureState();});el.addEventListener('input',()=>{if(isRestoring)return;clearTimeout(debounceTimer);debounceTimer=setTimeout(()=>{if(el._sf!==undefined){undoStack.push(el._sf);if(undoStack.length>MAX_STACK)undoStack.shift();el._sf=captureState();redoStack=[];updateBtns();}},600);});}}
document.addEventListener('keydown',e=>{const m=navigator.platform.toUpperCase().includes('MAC')?e.metaKey:e.ctrlKey;if(!m)return;if(e.key==='z'&&!e.shiftKey){e.preventDefault();doUndo();}if(e.key==='z'&&e.shiftKey){e.preventDefault();doRedo();}});
updateBtns();
function saveFile(){const clone=document.documentElement.cloneNode(true);const li=Array.from(document.querySelectorAll('input'));const ci=Array.from(clone.querySelectorAll('input'));li.forEach((l,i)=>{const c=ci[i];if(!c)return;if(l.type==='checkbox'){l.checked?c.setAttribute('checked','checked'):c.removeAttribute('checked');}else{c.setAttribute('value',l.value);}});clone.querySelector('#toolbar')?.remove();const b=new Blob(['<!DOCTYPE html>\n'+clone.outerHTML],{type:'text/html;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);const p=document.querySelector('.meta-value')?.value.trim().replace(/[^a-z0-9_\-\s]/gi,'').replace(/\s+/g,'-')||'HIF';a.download=p+'-Kickoff-Checklist.html';document.body.appendChild(a);a.click();document.body.removeChild(a);}
function toggleTheme(){const h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');}
document.documentElement.setAttribute('data-theme','light');
</script>
</body>
</html>
