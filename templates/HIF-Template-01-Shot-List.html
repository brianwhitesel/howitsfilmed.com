<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shot List — How It's Filmed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue" rel="stylesheet">
<style>
  :root, [data-theme="light"] {
  --bg: #FAFAFA;
  --bg2: #FFFFFF;
  --bg3: #F2F2F2;
  --bg4: #EBEBEB;
  --border: #E0E0E0;
  --border2: #D0D0D0;
  --accent: #FF3333;
  --accent2: #CC2020;
  --text: #1A1A1A;
  --text2: #555555;
  --text3: #999999;
  --logo-ink: #1a1a1a;
  --logo-bg: #FAFAFA;
  --font-ui: 'Inter', sans-serif;
  --font-head: 'Bebas Neue', sans-serif;
}
[data-theme="dark"] {
  --bg: #1A1A1A;
  --bg2: #212121;
  --bg3: #2a2a2a;
  --bg4: #2f2f2f;
  --border: #252525;
  --border2: #2e2e2e;
  --accent: #FF3333;
  --accent2: #CC2020;
  --text: #FFFFFF;
  --text2: #9a9490;
  --text3: #5a5650;
  --logo-ink: #FFFFFF;
  --logo-bg: #1A1A1A;
}
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 0;
  }

  /* TOOLBAR */
  .toolbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 6px 48px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toolbar-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .toolbar-btn:hover:not(:disabled) { border-color: var(--text3); color: var(--text); }
  .toolbar-btn:disabled { opacity: 0.28; cursor: default; }
  .toolbar-btn.save-btn { border-color: var(--accent2); color: var(--accent); }
  .toolbar-btn.save-btn:hover { background: rgba(255,51,51,0.08); }
  .toolbar-divider { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }
  .toolbar-shortcut {
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 0.04em;
    opacity: 0.7;
  }
  .undo-indicator {
    font-size: 10px;
    color: var(--text3);
    margin-left: 4px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .undo-indicator.flash { opacity: 1; }

  /* HEADER */
  .page-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 28px 48px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .brand-block { display: flex; flex-direction: column; gap: 4px; align-items: center; text-align: center; }
  .brand-name {
    font-family: var(--font-head);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .doc-title {
    font-family: var(--font-head);
    font-size: 32px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .doc-subtitle {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-meta {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px 24px;
  }
  .meta-field { display: flex; flex-direction: column; gap: 2px; align-items: center; }
  /* Change 2: meta labels now white */
  .meta-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text); text-align: center; }
  .meta-value {
    font-size: 12px;
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 2px 0;
    text-align: center;
    width: 160px;
    outline: none;
    font-family: var(--font-ui);
  }
  .meta-value:focus { border-bottom-color: var(--accent); }

  /* PROJECT INFO STRIP */
  .project-strip {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    padding: 16px 48px;
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }
  .strip-field { display: flex; align-items: center; gap: 10px; }
  /* Change 2: strip labels now white */
  .strip-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text); white-space: nowrap; }
  .strip-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 12px;
    padding: 2px 4px;
    outline: none;
    min-width: 120px;
  }
  .strip-input:focus { border-bottom-color: var(--accent); }

  /* MAIN CONTENT */
  .page-body { padding: 32px 48px 48px; }

  /* SCENE SECTION */
  .scene-block { margin-bottom: 32px; }
  .scene-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .scene-badge {
    background: var(--accent);
    color: #0d0d0d;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
  }
  .scene-title-input {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-head);
    font-size: 18px;
    font-style: italic;
    padding: 0;
    outline: none;
    flex: 1;
  }
  .scene-title-input::placeholder { color: var(--text3); }
  .scene-title-input:focus { border-bottom: 1px solid var(--accent); }
  .scene-notes-input {
    background: transparent;
    border: none;
    color: var(--text2);
    font-family: var(--font-ui);
    font-size: 11px;
    padding: 0;
    outline: none;
    min-width: 200px;
  }
  .scene-notes-input::placeholder { color: var(--text3); }

  /* SHOT TABLE */
  .shot-table {
    width: 100%;
    border-collapse: collapse;
  }
  .shot-table thead tr {
    background: var(--bg3);
  }
  .shot-table th {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text3);
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .shot-table td {
    padding: 0;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .shot-table tr:hover td { background: rgba(201,168,76,0.03); }

  .td-center { text-align: center; }
  .col-check  { width: 36px; }
  .col-shot   { width: 52px; }
  .col-type   { width: 90px; }
  .col-desc   { }
  /* Change 3: Camera column added */
  .col-camera { width: 110px; }
  .col-lens   { width: 100px; }
  .col-move   { width: 110px; }
  .col-notes  { width: 160px; }

  .cell-input {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    width: 100%;
    display: block;
  }
  .cell-input::placeholder { color: var(--text3); }
  .cell-input:focus { background: rgba(201,168,76,0.04); }

  /* Custom checkbox */
  .shot-check {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }
  .shot-check input[type="checkbox"] {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
  }
  .shot-check input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .shot-check input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 1px;
    width: 5px; height: 8px;
    border: 1.5px solid #0d0d0d;
    border-top: none; border-left: none;
    transform: rotate(40deg);
  }

  .shot-num {
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    padding: 10px 12px;
    font-weight: 500;
  }

  /* SELECT CELLS */
  .cell-select {
    background: transparent;
    border: none;
    color: var(--text2);
    font-family: var(--font-ui);
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    width: 100%;
    cursor: pointer;
  }
  .cell-select option { background: var(--bg); color: var(--text); }

  /* ADD ROW BUTTON */
  .add-row-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text3);
    font-family: var(--font-ui);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 8px 16px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: all 0.15s;
  }
  .add-row-btn:hover { border-color: var(--accent2); color: var(--accent); }
  .add-row-btn span { font-size: 16px; line-height: 1; }

  /* ADD SCENE BUTTON */
  .add-scene-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1px dashed var(--accent2);
    color: var(--accent);
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px 24px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .add-scene-btn:hover { background: rgba(201,168,76,0.06); }

  /* FOOTER */
  .page-footer {
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-brand { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; }
  .footer-brand span { color: var(--accent); }
  .footer-page { font-size: 10px; color: var(--text3); }

  /* ACCENT LINE */
  .accent-rule {
    height: 2px;
    background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
    margin-bottom: 0;
  }

  /* PRINT STYLES */
  @media print {
    .toolbar { display: none; }
    body { background: #fff; color: #1a1a1a; }
    .page-header { background: #fff; border-bottom: 2px solid #1a1a1a; padding: 20px 32px; }
    .brand-name { color: #FF3333; }
    .doc-title { color: #1a1a1a; }
    .meta-label { color: #333; }
    .meta-value { color: #1a1a1a; border-bottom-color: #ccc; }
    .project-strip { background: #f5f5f5; border-bottom: 1px solid #ddd; padding: 12px 32px; }
    .strip-label { color: #333; }
    .strip-input { color: #1a1a1a; border-bottom-color: #999; }
    .page-body { padding: 24px 32px 32px; }
    .scene-badge { background: #FF3333; color: #fff; }
    .scene-title-input { color: #1a1a1a; }
    .shot-table thead tr { background: #f0f0f0; }
    .shot-table th { color: #666; border-bottom-color: #ccc; }
    .shot-table td { border-bottom-color: #eee; }
    .cell-input, .cell-select { color: #1a1a1a; }
    .shot-num { color: #999; }
    .add-row-btn, .add-scene-btn { display: none; }
    .page-footer { border-top-color: #ccc; }
    .footer-brand, .footer-page { color: #999; }
    .footer-brand span { color: #FF3333; }
    .accent-rule { background: linear-gradient(90deg, #FF3333 0%, transparent 60%); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .toolbar { padding: 6px 12px; flex-wrap: wrap; gap: 6px; }
    .toolbar-btn { padding: 4px 8px; font-size: 10px; }
    .page-header { padding: 20px 16px 16px; flex-direction: column; align-items: center; gap: 12px; }
    .header-meta { flex-wrap: wrap; justify-content: center; gap: 8px 16px; }
    .meta-value { width: 140px; }
    .project-strip { padding: 12px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .strip-field { flex-direction: column; gap: 3px; }
    .strip-input { width: 100% !important; min-width: 0; }
    .page-body { padding: 16px 16px 32px; }
    .scene-block { overflow-x: auto; }
    .shot-table { min-width: 620px; }
    .page-footer { flex-direction: column; gap: 8px; align-items: flex-start; }
  }


  /* ─── THEME TOGGLE ─── */
  .theme-toggle {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 14px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    line-height: 1;
    font-family: var(--font-ui, sans-serif);
  }
  .theme-toggle:hover { border-color: var(--accent2); color: var(--accent); }
  .theme-icon { font-style: normal; }
  [data-theme="dark"] .theme-icon::before { content: "\2600"; }
  [data-theme="light"] .theme-icon::before { content: "\1F319"; }
  /* Mini toolbar for templates without a full toolbar */
  .hif-mini-toolbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 5px 48px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  @media print { .hif-mini-toolbar { display: none; } }
</style>
</head>

  </button>

    <div class="doc-subtitle">Production Document</div>

  <div class="header-meta">
    <div class="meta-field">
      <div class="meta-label">Project</div>
      <input class="meta-value" type="text" placeholder="Project Title">
    </div>
    <div class="meta-field">
      <div class="meta-label">Date</div>
      <input class="meta-value" type="text" placeholder="MM/DD/YYYY">
    </div>
    <div class="meta-field">
      <div class="meta-label">Director</div>

<script>
/* ─── SCENE / ROW MANAGEMENT ─── */
let sceneCount = 1;
let shotCounters = {1: 4};
const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function shotLabel(sceneNum, idx) {
  return sceneNum + letters[idx];
}

function createRow(sceneNum, idx) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-check"><div class="shot-check"><input type="checkbox"></div></td>
    <td class="col-shot"><div class="shot-num">${shotLabel(sceneNum, idx)}</div></td>
    <td class="col-type"><select class="cell-select"><option value="">— Select —</option><option>Wide / Est.</option><option>Medium</option><option>Close-Up</option><option>ECU</option><option>OTS</option><option>POV</option><option>Insert</option><option>Aerial</option><option>B-Roll</option></select></td>
    <td><input class="cell-input" type="text" placeholder="Describe the shot composition and action..."></td>
    <td><input class="cell-input" type="text" placeholder="Cam A"></td>
    <td><input class="cell-input" type="text" placeholder="24mm f/1.8"></td>
    <td><select class="cell-select"><option value="">— Select —</option><option>Static</option><option>Pan</option><option>Tilt</option><option>Dolly In</option><option>Dolly Out</option><option>Tracking</option><option>Handheld</option><option>Gimbal</option><option>Crane</option><option>Drone</option></select></td>
    <td><input class="cell-input" type="text" placeholder="Focus pull, lighting note..."></td>`;
  // Wire up new inputs for undo tracking
  tr.querySelectorAll('input, select').forEach(el => attachUndoListeners(el));
  return tr;
}

function addRow(btn) {
  pushState(); // record state before structural change
  const sceneBlock = btn.closest('.scene-block');
  const tbody = sceneBlock.querySelector('tbody');
  const sceneNum = parseInt(sceneBlock.dataset.scene || 1);
  if (!shotCounters[sceneNum]) shotCounters[sceneNum] = 0;
  tbody.appendChild(createRow(sceneNum, shotCounters[sceneNum]));
  shotCounters[sceneNum]++;
}

function addScene() {
  pushState();
  sceneCount++;
  const num = String(sceneCount).padStart(2,'0');
  shotCounters[sceneCount] = 0;
  const div = document.createElement('div');
  div.className = 'scene-block';
  div.dataset.scene = sceneCount;
  div.innerHTML = `
    <div class="scene-header">
      <div class="scene-badge">Scene ${num}</div>
      <input class="scene-title-input" type="text" placeholder="INT./EXT. Location — Time (Scene description)">
      <input class="scene-notes-input" type="text" placeholder="Additional context...">
    </div>
    <table class="shot-table">
      <thead><tr>
        <th class="col-check td-center">✓</th>
        <th class="col-shot td-center">Shot</th>
        <th class="col-type">Type</th>
        <th class="col-desc">Description</th>
        <th class="col-camera">Camera</th>
        <th class="col-lens">Lens</th>
        <th class="col-move">Movement</th>

      </tr></thead>
      <tbody></tbody>
    </table>
    <button class="add-row-btn" onclick="addRow(this)"><span>+</span> Add Shot</button>`;
  const addBtn = document.querySelector('.add-scene-btn');
  addBtn.parentNode.insertBefore(div, addBtn);
  // Wire up scene text inputs
  div.querySelectorAll('input, select').forEach(el => attachUndoListeners(el));
  const tbody = div.querySelector('tbody');
  for (let i = 0; i < 3; i++) {
    tbody.appendChild(createRow(sceneCount, shotCounters[sceneCount]));
    shotCounters[sceneCount]++;
  }
}

document.querySelector('.scene-block').dataset.scene = 1;


/* ─── UNDO / REDO ─── */
const MAX_STACK = 50;
let undoStack = [];
let redoStack = [];
let isRestoring = false;
let debounceTimer = null;

/** Serialize all interactive field values in the document */
function captureState() {
  const fields = document.querySelectorAll('input[type="text"], input[type="checkbox"], select');
  const data = [];
  fields.forEach(el => {
    data.push({
      tag: el.tagName,
      type: el.type || '',
      value: el.type === 'checkbox' ? el.checked : el.value,
      // index among all matching fields — used for restore
    });
  });
  return JSON.stringify(data);
}

/** Restore a previously captured state */
function restoreState(stateStr) {
  isRestoring = true;
  const data = JSON.parse(stateStr);
  const fields = document.querySelectorAll('input[type="text"], input[type="checkbox"], select');
  data.forEach((entry, i) => {
    const el = fields[i];
    if (!el) return;
    if (entry.type === 'checkbox') {
      el.checked = entry.value;
    } else {
      el.value = entry.value;
    }
  });
  isRestoring = false;
  updateToolbarButtons();
}

/** Push the current state onto the undo stack (called before a change) */
function pushState(state) {
  if (isRestoring) return;
  const s = state || captureState();
  undoStack.push(s);
  if (undoStack.length > MAX_STACK) undoStack.shift();
  redoStack = []; // new action clears redo
  updateToolbarButtons();
}

function doUndo() {
  if (undoStack.length === 0) return;
  const current = captureState();
  redoStack.push(current);
  const prev = undoStack.pop();
  restoreState(prev);
  flashIndicator('Undone');
}

function doRedo() {
  if (redoStack.length === 0) return;
  const current = captureState();
  undoStack.push(current);
  if (undoStack.length > MAX_STACK) undoStack.shift();
  const next = redoStack.pop();
  restoreState(next);
  flashIndicator('Redone');
}

function updateToolbarButtons() {
  document.getElementById('btn-undo').disabled = undoStack.length === 0;
  document.getElementById('btn-redo').disabled = redoStack.length === 0;
}

function flashIndicator(msg) {
  const el = document.getElementById('undo-indicator');
  el.textContent = msg;
  el.classList.add('flash');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('flash'), 1200);
}

/** Attach undo-tracking listeners to a field */
function attachUndoListeners(el) {
  if (el.type === 'checkbox') {
    el.addEventListener('change', () => {
      if (!isRestoring) { pushState(); /* checkbox is instant */ }
    });
  } else if (el.tagName === 'SELECT') {
    el.addEventListener('change', () => {
      if (!isRestoring) pushState();
    });
  } else {
    // text inputs: debounce so we don't snapshot every keystroke
    el.addEventListener('focus', () => {
      if (!isRestoring) el._stateOnFocus = captureState();
    });
    el.addEventListener('input', () => {
      if (isRestoring) return;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        if (el._stateOnFocus !== undefined) {
          undoStack.push(el._stateOnFocus);
          if (undoStack.length > MAX_STACK) undoStack.shift();
          el._stateOnFocus = captureState(); // update anchor
          redoStack = [];
          updateToolbarButtons();
        }
      }, 600);
    });
  }
}

// Wire up all existing fields on page load
document.querySelectorAll('input[type="text"], input[type="checkbox"], select').forEach(el => {
  attachUndoListeners(el);
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  const isMac = navigator.platform.toUpperCase().includes('MAC');
  const mod = isMac ? e.metaKey : e.ctrlKey;
  if (!mod) return;
  if (e.key === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
  if (e.key === 'z' &&  e.shiftKey) { e.preventDefault(); doRedo(); }
  if (e.key === 'y' && !isMac)      { e.preventDefault(); doRedo(); }
});

// Initialize button states
updateToolbarButtons();


/* ─── SAVE FILE ─── */
function saveFile() {
  // Snapshot current input values into the HTML before saving
  // We clone the document, inject current values as attributes so they appear in the saved file
  const doctype = '<!DOCTYPE html>';
  const clone = document.documentElement.cloneNode(true);

  // Walk all inputs/selects in the LIVE doc and mirror to clone
  const liveInputs = Array.from(document.querySelectorAll('input, select, textarea'));
  const cloneInputs = Array.from(clone.querySelectorAll('input, select, textarea'));

  liveInputs.forEach((live, i) => {
    const cl = cloneInputs[i];
    if (!cl) return;
    if (live.type === 'checkbox') {
      if (live.checked) cl.setAttribute('checked', 'checked');
      else cl.removeAttribute('checked');
    } else if (live.tagName === 'SELECT') {
      // Set selected option
      Array.from(cl.options).forEach((opt, j) => {
        if (live.options[j] && live.options[j].selected) opt.setAttribute('selected', 'selected');
        else opt.removeAttribute('selected');
      });
    } else {
      cl.setAttribute('value', live.value);
    }
  });

  // Remove toolbar from saved file (it's a utility UI)
  const toolbarEl = clone.querySelector('#toolbar');
  if (toolbarEl) toolbarEl.remove();

  const html = doctype + '\n' + clone.outerHTML;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  // Use project name if filled in, otherwise default
  const projectInput = document.querySelector('.meta-value');
  const projectName = projectInput && projectInput.value.trim()
    ? projectInput.value.trim().replace(/[^a-z0-9_\-\s]/gi, '').replace(/\s+/g, '-')
    : 'HIF-Shot-List';
  a.download = `${projectName}-Shot-List.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>

  }
  window.toggleTheme = toggleTheme;
  document.documentElement.setAttribute('data-theme', 'light');
