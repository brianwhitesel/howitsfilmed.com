<style>
/* BW Design System v1 — do not edit manually, maintained by design-system-enforcer */
:root {
  --bg: #080c14;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --surface3: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f1f5f9;
  --dim: #94a3b8;
  --muted: #4b5e78;
  --accent: #e41e2b;
  --blue: #3b82f6;
  --green: #34d369;
  --teal: #14b8a6;
  --amber: #f59e0b;
  --purple: #8b5cf6;
  --font-head: 'Outfit', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.15s ease;
}
html.light {
  --bg: #f0f2f5;
  --surface: rgba(255,255,255,0.85);
  --surface2: rgba(255,255,255,0.95);
  --surface3: #ffffff;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #0d1117;
  --dim: #475569;
  --muted: #94a3b8;
}

:root, [data-theme="light"] {
  --bg: #FAFAFA; --bg2: #FFFFFF; --bg3: #F2F2F2; --bg4: #EBEBEB;
  --border: #E0E0E0; --border2: #D0D0D0;
  --accent: #FF3333; --accent2: #CC2020;
  --text: #1A1A1A; --text2: #555555; --text3: #999999;
  --logo-ink: #1a1a1a; --logo-bg: #FAFAFA;
  --font-ui: 'Inter', sans-serif; --font-head: 'Bebas Neue', sans-serif;
}
[data-theme="dark"] {
  --bg: #1A1A1A; --bg2: #212121; --bg3: #2a2a2a; --bg4: #2f2f2f;
  --border: #252525; --border2: #2e2e2e;
  --accent: #FF3333; --accent2: #CC2020;
  --text: #FFFFFF; --text2: #9a9490; --text3: #5a5650;
  --logo-ink: #FFFFFF; --logo-bg: #1A1A1A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 13px; min-height: 100vh; }
.toolbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 6px 48px; display: flex; align-items: center; gap: 8px;
}
.toolbar-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; border: 1px solid var(--border); color: var(--text2);
  font-family: var(--font-ui); font-size: 11px; font-weight: 500;
  letter-spacing: 0.06em; padding: 5px 12px; cursor: pointer;
  border-radius: 2px; transition: all 0.15s; white-space: nowrap;
}
.toolbar-btn:hover { border-color: var(--text3); color: var(--text); }
.toolbar-btn.save-btn { border-color: var(--accent2); color: var(--accent); }
.toolbar-btn.save-btn:hover { background: rgba(255,51,51,0.08); }
.theme-toggle {
  margin-left: auto; background: transparent; border: 1px solid var(--border);
  color: var(--text2); font-size: 14px; padding: 4px 10px; cursor: pointer;
  border-radius: 2px; transition: all 0.15s; line-height: 1;
  font-family: var(--font-ui, sans-serif);
}
.theme-toggle:hover { border-color: var(--accent2); color: var(--accent); }
[data-theme="dark"] .theme-icon::before { content: "\2600"; }
[data-theme="light"] .theme-icon::before { content: "\1F319"; }
.accent-rule { height: 2px; background: linear-gradient(90deg, var(--accent) 0%, transparent 60%); }
.page-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 48px 64px; }
.doc-header { display: flex; align-items: flex-start; gap: 32px; margin-bottom: 28px; flex-wrap: wrap; }
.doc-titles { flex: 1; min-width: 200px; }
.doc-title { font-family: var(--font-head); font-size: 38px; line-height: 1; color: var(--text); letter-spacing: 0.02em; margin-bottom: 2px; }
.doc-subtitle { font-size: 10px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; flex: 2; min-width: 280px; }
.meta-field { display: flex; flex-direction: column; gap: 3px; }
.meta-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
.meta-input {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  font-family: var(--font-ui); font-size: 12px; padding: 5px 8px;
  border-radius: 2px; outline: none; width: 100%;
}
.meta-input:focus { border-color: var(--accent2); }
.section-label {
  font-family: var(--font-head); font-size: 18px; letter-spacing: 0.08em;
  color: var(--text); margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 4px; background: var(--bg2); margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; min-width: 700px; }
thead tr { background: var(--bg3); }
th {
  padding: 8px 10px; text-align: left; font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text3); font-weight: 600;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
td {
  padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }
.td-input {
  background: transparent; border: 1px solid transparent; color: var(--text);
  font-family: var(--font-ui); font-size: 12px; padding: 3px 6px;
  border-radius: 2px; width: 100%; outline: none; min-width: 80px;
}
.td-input:focus { background: var(--bg3); border-color: var(--border2); }
.td-select {
  background: transparent; border: 1px solid transparent; color: var(--text);
  font-family: var(--font-ui); font-size: 12px; padding: 3px 4px;
  border-radius: 2px; outline: none; cursor: pointer; width: 100%;
}
.td-select:focus { background: var(--bg3); border-color: var(--border2); }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 2px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.05em; white-space: nowrap;
}
.status-not-started { background: var(--bg4); color: var(--text2); }
.status-in-progress { background: #FFF3E0; color: #E8A020; }
.status-review { background: #E3EEFF; color: #2080E8; }
.status-complete { background: #E3FFEC; color: #20A860; }
[data-theme="dark"] .status-in-progress { background: #3a2800; color: #ffb340; }
[data-theme="dark"] .status-review { background: #0a1f4a; color: #5599ff; }
[data-theme="dark"] .status-complete { background: #0a2a14; color: #40cc70; }
.del-btn {
  background: transparent; border: none; color: var(--text3); cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 2px; transition: all 0.15s;
}
.del-btn:hover { color: var(--accent); background: rgba(255,51,51,0.08); }
.add-btn {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px dashed var(--border2); background: transparent;
  color: var(--text3); font-family: var(--font-ui); font-size: 11px; font-weight: 500;
  letter-spacing: 0.06em; padding: 7px 16px; cursor: pointer;
  border-radius: 2px; transition: all 0.15s; margin-bottom: 32px;
}
.add-btn:hover { border-color: var(--accent2); color: var(--accent); }
.gantt-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-bottom: 24px; }
.gantt-title { font-family: var(--font-head); font-size: 20px; letter-spacing: 0.08em; color: var(--text); margin-bottom: 16px; }
.gantt-wrap { position: relative; overflow-x: auto; }
.gantt-chart { position: relative; min-height: 60px; }
.gantt-placeholder { color: var(--text3); font-size: 12px; padding: 20px; text-align: center; }
.gantt-bar-row { display: flex; align-items: center; margin-bottom: 8px; gap: 0; }
.gantt-label { width: 140px; min-width: 140px; font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; text-align: right; }
.gantt-track { flex: 1; height: 28px; background: var(--bg3); border-radius: 2px; position: relative; }
.gantt-bar {
  position: absolute; top: 4px; height: 20px; border-radius: 2px;
  display: flex; align-items: center; padding: 0 6px;
  font-size: 9px; font-weight: 600; color: #fff; letter-spacing: 0.05em;
  white-space: nowrap; overflow: hidden; transition: all 0.3s;
}
.gantt-today {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: var(--accent); opacity: 0.8;
}
.gantt-today-label {
  position: absolute; top: -18px; font-size: 9px; color: var(--accent);
  transform: translateX(-50%); white-space: nowrap; font-weight: 600;
}
.gantt-axis { display: flex; margin-left: 140px; margin-bottom: 8px; position: relative; overflow: hidden; }
.gantt-axis-tick { font-size: 9px; color: var(--text3); position: absolute; transform: translateX(-50%); white-space: nowrap; }
.page-footer {
  margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
@media (max-width: 600px) {
  .page-wrap { padding: 16px; }
  .toolbar { padding: 6px 16px; }
  .meta-grid { grid-template-columns: 1fr; }
  .doc-header { flex-direction: column; gap: 16px; }
}
</style>
</head>

<script>
(function() {
  function toggleTheme() {
    var html = document.documentElement;
    var isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  }
  window.toggleTheme = toggleTheme;
  document.documentElement.setAttribute('data-theme', 'light');
})();

var statusColors = {
  'Not Started': '#888888',
  'In Progress': '#E8A020',
  'Review': '#2080E8',
  'Complete': '#20A860'
};
var statusClasses = {
  'Not Started': 'status-not-started',
  'In Progress': 'status-in-progress',
  'Review': 'status-review',
  'Complete': 'status-complete'
};

var defaultPhases = [
  'Assembly Cut','Rough Cut','Fine Cut','Color Grade',
  'Sound Mix','VFX/Motion','Review & Revisions','Final Deliverables'
];

function addPhase(name) {
  var tbody = document.getElementById('phase-body');
  var tr = document.createElement('tr');
  var phaseName = name || '';
  tr.innerHTML =
    '<td><input class="td-input" type="text" value="' + phaseName + '" placeholder="Phase name" oninput="renderGantt()"></td>' +
    '<td><input class="td-input" type="text" placeholder="Name"></td>' +
    '<td><input class="td-input" type="date" onchange="renderGantt()"></td>' +
    '<td><input class="td-input" type="date" onchange="renderGantt()"></td>' +
    '<td><select class="td-select status-sel" onchange="updateStatusBadge(this);renderGantt()">' +
      '<option value="Not Started">Not Started</option>' +
      '<option value="In Progress">In Progress</option>' +
      '<option value="Review">Review</option>' +
      '<option value="Complete">Complete</option>' +
    '</select></td>' +
    '<td><input class="td-input" type="text" placeholder="Notes"></td>' +
    '<td><button class="del-btn" onclick="this.closest('tr').remove();renderGantt()">&#215;</button></td>';
  tbody.appendChild(tr);
  updateStatusBadge(tr.querySelector('.status-sel'));
}

function updateStatusBadge(sel) {
  var cls = statusClasses[sel.value] || 'status-not-started';
  sel.className = 'td-select status-sel badge ' + cls;
}

function renderGantt() {
  var rows = Array.from(document.querySelectorAll('#phase-body tr'));
  var phases = [];
  rows.forEach(function(tr) {
    var inputs = tr.querySelectorAll('input');
    var name = inputs[0].value.trim();
    var startVal = inputs[2].value;
    var endVal = inputs[3].value;
    var status = tr.querySelector('.status-sel').value;
    if (name && startVal && endVal) {
      phases.push({ name: name, start: new Date(startVal), end: new Date(endVal), status: status });
    }
  });

  var chart = document.getElementById('gantt-chart');
  var axis = document.getElementById('gantt-axis');
  var placeholder = document.getElementById('gantt-placeholder');

  if (phases.length === 0) {
    chart.innerHTML = '<div class="gantt-placeholder">Enter start and end dates above to see the timeline chart.</div>';
    axis.innerHTML = '';
    return;
  }

  var minDate = new Date(Math.min.apply(null, phases.map(function(p){ return p.start; })));
  var maxDate = new Date(Math.max.apply(null, phases.map(function(p){ return p.end; })));
  var totalDays = Math.max((maxDate - minDate) / 86400000, 1);
  var today = new Date();

  chart.innerHTML = '';
  axis.innerHTML = '';

  // Axis ticks
  var numTicks = Math.min(7, Math.ceil(totalDays));
  for (var t = 0; t <= numTicks; t++) {
    var tickDate = new Date(minDate.getTime() + (totalDays * t / numTicks) * 86400000);
    var pct = (t / numTicks) * 100;
    var tick = document.createElement('div');
    tick.className = 'gantt-axis-tick';
    tick.style.left = pct + '%';
    tick.textContent = tickDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    axis.appendChild(tick);
  }

  phases.forEach(function(p) {
    var row = document.createElement('div');
    row.className = 'gantt-bar-row';

    var label = document.createElement('div');
    label.className = 'gantt-label';
    label.textContent = p.name;

    var track = document.createElement('div');
    track.className = 'gantt-track';

    var startPct = Math.max(0, (p.start - minDate) / 86400000 / totalDays * 100);
    var widthPct = Math.max(1, (p.end - p.start) / 86400000 / totalDays * 100);

    var bar = document.createElement('div');
    bar.className = 'gantt-bar';
    bar.style.left = startPct + '%';
    bar.style.width = widthPct + '%';
    bar.style.background = statusColors[p.status] || '#888';
    bar.textContent = p.name;

    // Today marker
    if (today >= minDate && today <= maxDate) {
      var todayPct = (today - minDate) / 86400000 / totalDays * 100;
      var todayLine = document.createElement('div');
      todayLine.className = 'gantt-today';
      todayLine.style.left = todayPct + '%';
      var todayLabel = document.createElement('div');
      todayLabel.className = 'gantt-today-label';
      todayLabel.style.left = todayPct + '%';
      todayLabel.textContent = 'TODAY';
      track.appendChild(todayLabel);
      track.appendChild(todayLine);
    }

    track.appendChild(bar);
    row.appendChild(label);
    row.appendChild(track);
    chart.appendChild(row);
  });
}

// Pre-populate default phases
defaultPhases.forEach(function(name) { addPhase(name); });

function saveFile() {
  var doctype = '<!DOCTYPE html>';
  var clone = document.documentElement.cloneNode(true);
  var liveInputs = Array.from(document.querySelectorAll('input, select, textarea'));
  var cloneInputs = Array.from(clone.querySelectorAll('input, select, textarea'));
  liveInputs.forEach(function(live, i) {
    var cl = cloneInputs[i];
    if (!cl) return;
    if (live.type === 'checkbox') {
      if (live.checked) cl.setAttribute('checked', 'checked');
      else cl.removeAttribute('checked');
    } else if (live.tagName === 'SELECT') {
      Array.from(cl.options).forEach(function(opt, j) {
        if (live.options[j] && live.options[j].selected) opt.setAttribute('selected', 'selected');
        else opt.removeAttribute('selected');
      });
    } else {
      cl.setAttribute('value', live.value);
    }
  });
  var toolbarEl = clone.querySelector('.toolbar');
  if (toolbarEl) toolbarEl.remove();
  var html = doctype + '\n' + clone.outerHTML;
  var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'HIF-Post-Production-Timeline.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
