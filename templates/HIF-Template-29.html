<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Caption Bank — How It's Filmed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  --bg: #FAFAFA; --bg2: #FFFFFF; --bg3: #F2F2F2; --bg4: #EBEBEB;
  --border: #E0E0E0; --border2: #D0D0D0;
  --accent: #FF3333; --accent2: #CC2020;
  --text: #1A1A1A; --text2: #555555; --text3: #999999;
  --logo-ink: #1a1a1a; --logo-bg: #FAFAFA;
  --font-ui: 'Inter', sans-serif; --font-head: 'Bebas Neue', sans-serif;
}
[data-theme="dark"] {
  --bg: #1A1A1A; --bg2: #212121; --bg3: #2a2a2a; --bg4: #2f2f2f;
  --border: #252525; --border2: #2e2e2e;
  --accent: #FF3333; --accent2: #CC2020;
  --text: #FFFFFF; --text2: #9a9490; --text3: #5a5650;
  --logo-ink: #FFFFFF; --logo-bg: #1A1A1A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-ui); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }
.accent-rule { height: 2px; background: linear-gradient(90deg, var(--accent) 0%, transparent 60%); }
.toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.toolbar-btn { background: transparent; border: 1px solid var(--border); color: var(--text2); font-size: 12px; padding: 4px 10px; cursor: pointer; border-radius: 2px; font-family: var(--font-ui); transition: all 0.15s; }
.toolbar-btn:hover:not(:disabled) { border-color: var(--accent2); color: var(--accent); }
.toolbar-btn:disabled { opacity: 0.35; cursor: default; }
.toolbar-btn.save-btn { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.toolbar-btn.save-btn:hover { background: var(--accent2); border-color: var(--accent2); }
.toolbar-divider { width: 1px; height: 20px; background: var(--border); }
.toolbar-shortcut { font-size: 10px; opacity: 0.6; margin-left: 2px; }
.undo-indicator { font-size: 11px; color: var(--text3); margin-left: 4px; min-width: 80px; }
.theme-toggle { margin-left: auto; background: transparent; border: 1px solid var(--border); color: var(--text2); font-size: 14px; padding: 4px 10px; cursor: pointer; border-radius: 2px; transition: all 0.15s; line-height: 1; }
.theme-toggle:hover { border-color: var(--accent2); color: var(--accent); }
[data-theme="dark"] .theme-icon::before { content: "\2600"; }
[data-theme="light"] .theme-icon::before { content: "\1F319"; }

.page-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 20px 24px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); gap: 24px; flex-wrap: wrap; }
.brand-block { display: flex; flex-direction: column; gap: 6px; }
.doc-title { font-family: var(--font-head); font-size: 26px; color: var(--text); letter-spacing: 1px; line-height: 1; }
.doc-subtitle { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.header-meta { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start; }
.meta-field { display: flex; flex-direction: column; gap: 3px; }
.meta-field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-weight: 600; }
.meta-field input { border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-family: var(--font-ui); font-size: 13px; padding: 5px 8px; border-radius: 2px; width: 160px; }
.meta-field input:focus { outline: none; border-color: var(--accent); }

.filter-bar { display: flex; align-items: center; gap: 24px; padding: 12px 24px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); font-weight: 600; margin-right: 4px; }
.filter-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-size: 12px; padding: 4px 12px; cursor: pointer; border-radius: 20px; font-family: var(--font-ui); transition: all 0.15s; }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

.page-body { padding: 20px 24px; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 18px; }

.caption-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: box-shadow 0.15s; }
.caption-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.caption-card.hidden { display: none; }

.card-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
.platform-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; color: white; flex-shrink: 0; }
.platform-badge.ig { background: #E1306C; }
.platform-badge.tiktok { background: #000; border: 1px solid #69C9D0; }
[data-theme="dark"] .platform-badge.tiktok { background: #1a1a1a; }
.platform-badge.youtube { background: #FF0000; }
.platform-badge.linkedin { background: #0077B5; }

.card-select { border: 1px solid var(--border); background: var(--bg4); color: var(--text); font-family: var(--font-ui); font-size: 11px; padding: 3px 7px; border-radius: 3px; }
.card-select:focus { outline: none; border-color: var(--accent); }
.card-select option { background: var(--bg2); }

.status-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; cursor: pointer; border: none; font-family: var(--font-ui); transition: all 0.15s; flex-shrink: 0; }
.status-badge.draft { background: var(--bg4); color: var(--text3); border: 1px solid var(--border2); }
.status-badge.scheduled { background: #fff3cd; color: #856404; border: 1px solid #ffe083; }
[data-theme="dark"] .status-badge.scheduled { background: #3a2e00; color: #ffd700; border-color: #5a4a00; }
.status-badge.posted { background: #d1f5e0; color: #0a7d3e; border: 1px solid #7de0a8; }
[data-theme="dark"] .status-badge.posted { background: #0a2e1a; color: #4dc88a; border-color: #1a5c36; }

.card-date { border: 1px solid var(--border); background: var(--bg4); color: var(--text); font-family: var(--font-ui); font-size: 11px; padding: 3px 7px; border-radius: 3px; margin-left: auto; }
.card-date:focus { outline: none; border-color: var(--accent); }

.card-delete { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 3px; transition: color 0.15s; margin-left: 4px; }
.card-delete:hover { color: var(--accent); }

.card-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }

.caption-textarea { width: 100%; min-height: 90px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-family: var(--font-ui); font-size: 13px; padding: 8px 10px; border-radius: 4px; resize: vertical; line-height: 1.5; }
.caption-textarea:focus { outline: none; border-color: var(--accent); }
.caption-textarea::placeholder { color: var(--text3); }

.hashtag-input { width: 100%; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-family: var(--font-ui); font-size: 12px; padding: 6px 10px; border-radius: 4px; }
.hashtag-input:focus { outline: none; border-color: var(--accent); }
.hashtag-input::placeholder { color: var(--text3); }

.char-counter { display: flex; align-items: center; gap:8px; font-size: 11px; }
.char-count-num { font-weight: 600; }
.char-count-bar { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.char-count-fill { height: 100%; border-radius: 2px; transition: width 0.2s, background 0.2s; }
.char-ok { color: var(--text3); }
.char-warn { color: #e08a00; }
.char-over { color: var(--accent); }

.add-card-btn { margin-top: 8px; display: inline-flex; align-items: center; gap: 6px; background: transparent; border: 2px dashed var(--border2); color: var(--text3); font-family: var(--font-ui); font-size: 13px; font-weight: 600; padding: 14px 24px; cursor: pointer; border-radius: 8px; transition: all 0.15s; width: 100%; justify-content: center; max-width: 380px; }
.add-card-btn:hover { border-color: var(--accent); color: var(--accent); }

.page-footer { padding: 14px 24px; border-top: 1px solid var(--border); background: var(--bg3); display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text3); margin-top: 20px; }

@media (max-width: 600px) {
  .page-header { flex-direction: column; }
  .cards-grid { grid-template-columns: 1fr; }
  .page-body { padding: 12px 16px; }
  .filter-bar { padding: 10px 16px; }
}
@media print { .toolbar { display: none; } }
</style>
</head>

<script>
(function() {
  function toggleTheme() {
    var html = document.documentElement;
    var isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  }
  window.toggleTheme = toggleTheme;
  document.documentElement.setAttribute('data-theme', 'light');
})();

var undoStack = [], redoStack = [], lastState = null, undoTimeout = null;
var activeFilters = { platform: 'all', status: 'all' };
var cardCount = 0;

var PLATFORM_LIMITS = { ig: 2200, tiktok: 2200, youtube: 5000, linkedin: 3000 };

function captureState() {
  var state = {};
  document.querySelectorAll('input, textarea, select').forEach(function(el, i) {
    state[el.id || 'el_' + i] = el.value;
  });
  var cards = document.querySelectorAll('.caption-card');
  state['__cardCount'] = cards.length;
  return JSON.stringify(state);
}

function pushState() {
  var c = captureState();
  if (c === lastState) return;
  if (lastState !== null) undoStack.push(lastState);
  lastState = c; redoStack = [];
  if (undoStack.length > 100) undoStack.shift();
  updateButtons();
}

function doUndo() {
  if (!undoStack.length) return;
  redoStack.push(captureState());
  var p = undoStack.pop(); lastState = p;
  document.querySelectorAll('input, textarea, select').forEach(function(el, i) {
    var state = JSON.parse(p); var k = el.id || 'el_' + i;
    if (state[k] !== undefined) el.value = state[k];
  });
  updateButtons(); showIndicator('Undone');
}
function doRedo() {
  if (!redoStack.length) return;
  undoStack.push(captureState());
  var n = redoStack.pop(); lastState = n;
  document.querySelectorAll('input, textarea, select').forEach(function(el, i) {
    var state = JSON.parse(n); var k = el.id || 'el_' + i;
    if (state[k] !== undefined) el.value = state[k];
  });
  updateButtons(); showIndicator('Redone');
}
function updateButtons() {
  document.getElementById('btn-undo').disabled = !undoStack.length;
  document.getElementById('btn-redo').disabled = !redoStack.length;
}
function showIndicator(m) {
  var el = document.getElementById('undo-indicator'); el.textContent = m;
  setTimeout(function() { el.textContent = ''; }, 1500);
}

function setFilter(type, val, btn) {
  activeFilters[type] = val;
  var group = btn.parentElement;
  group.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  applyFilters();
}
window.setFilter = setFilter;

function applyFilters() {
  document.querySelectorAll('.caption-card').forEach(function(card) {
    var matchPlatform = activeFilters.platform === 'all' || card.dataset.platform === activeFilters.platform;
    var matchStatus = activeFilters.status === 'all' || card.dataset.status === activeFilters.status;
    card.classList.toggle('hidden', !(matchPlatform && matchStatus));
  });
}

function cycleStatus(btn) {
  pushState();
  var states = ['draft','scheduled','posted'];
  var labels = ['Draft','Scheduled','Posted'];
  var card = btn.closest('.caption-card');
  var cur = states.indexOf(card.dataset.status);
  var next = (cur + 1) % states.length;
  card.dataset.status = states[next];
  btn.textContent = labels[next];
  btn.className = 'status-badge ' + states[next];
  applyFilters();
  pushState();
}
window.cycleStatus = cycleStatus;

function updateCharCount(textarea) {
  var card = textarea.closest('.caption-card');
  var platform = card.dataset.platform || 'ig';
  var limit = PLATFORM_LIMITS[platform] || 2200;
  var len = textarea.value.length;
  var pct = Math.min(len / limit, 1);
  var counter = card.querySelector('.char-count-num');
  var fill = card.querySelector('.char-count-fill');
  var cls = len > limit ? 'char-over' : (len > limit * 0.9 ? 'char-warn' : 'char-ok');
  counter.textContent = len + ' / ' + limit;
  counter.className = 'char-count-num ' + cls;
  fill.style.width = (pct * 100) + '%';
  fill.style.background = len > limit ? 'var(--accent)' : (len > limit * 0.9 ? '#e08a00' : '#1a9e5c');
}

function changePlatform(select) {
  var card = select.closest('.caption-card');
  var platform = select.value;
  card.dataset.platform = platform;
  var badge = card.querySelector('.platform-badge');
  badge.className = 'platform-badge ' + platform;
  badge.textContent = platform === 'linkedin' ? 'LinkedIn' : platform.toUpperCase();
  var textarea = card.querySelector('.caption-textarea');
  updateCharCount(textarea);
  applyFilters();
}
window.changePlatform = changePlatform;

function deleteCard(btn) {
  pushState();
  btn.closest('.caption-card').remove();
  pushState();
}
window.deleteCard = deleteCard;

function createCard(opts) {
  opts = opts || {};
  var platform = opts.platform || 'ig';
  var status = opts.status || 'draft';
  var postType = opts.postType || 'Reel';
  var caption = opts.caption || '';
  var hashtags = opts.hashtags || '';
  var date = opts.date || '';
  var id = 'card_' + (++cardCount);

  var platformLabels = { ig: 'IG', tiktok: 'TikTok', youtube: 'YouTube', linkedin: 'LinkedIn' };
  var statusLabels = { draft: 'Draft', scheduled: 'Scheduled', posted: 'Posted' };

  var card = document.createElement('div');
  card.className = 'caption-card';
  card.dataset.platform = platform;
  card.dataset.status = status;
  card.id = id;

  card.innerHTML = `
    <div class="card-header">
      <span class="platform-badge ${platform}">${platformLabels[platform]}</span>
      <select class="card-select" onchange="changePlatform(this)">
        <option value="ig"${platform==='ig'?' selected':''}>IG</option>
        <option value="tiktok"${platform==='tiktok'?' selected':''}>TikTok</option>
        <option value="youtube"${platform==='youtube'?' selected':''}>YouTube</option>
        <option value="linkedin"${platform==='linkedin'?' selected':''}>LinkedIn</option>
      </select>
      <select class="card-select">
        <option${postType==='Reel'?' selected':''}>Reel</option>
        <option${postType==='Story'?' selected':''}>Story</option>
        <option${postType==='Feed Post'?' selected':''}>Feed Post</option>
        <option${postType==='Short'?' selected':''}>Short</option>
        <option${postType==='Long-form'?' selected':''}>Long-form</option>
        <option${postType==='Carousel'?' selected':''}>Carousel</option>
      </select>
      <button class="status-badge ${status}" onclick="cycleStatus(this)">${statusLabels[status]}</button>
      <input type="date" class="card-date" value="${date}">
      <button class="card-delete" onclick="deleteCard(this)" title="Delete card">✕</button>
    </div>
    <div class="card-body">
      <textarea class="caption-textarea" placeholder="Write your caption here..." oninput="updateCharCount(this); schedulePush();">${caption}</textarea>
      <input type="text" class="hashtag-input" placeholder="#hashtags #filmmaking #behindthescenes" value="${hashtags}">
      <div class="char-counter">
        <span class="char-count-num char-ok">0 / ${PLATFORM_LIMITS[platform]}</span>
        <div class="char-count-bar"><div class="char-count-fill" style="width:0%;background:#1a9e5c;"></div></div>
      </div>
    </div>
  `;

  document.getElementById('cards-grid').appendChild(card);
  var textarea = card.querySelector('.caption-textarea');
  if (caption) updateCharCount(textarea);
  attachUndoListeners();
  applyFilters();
  return card;
}

function addCard() {
  pushState();
  createCard();
  pushState();
}
window.addCard = addCard;

var pushTimer = null;
window.schedulePush = function() {
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushState, 600);
};

function attachUndoListeners() {
  document.querySelectorAll('input, textarea, select').forEach(function(el) {
    if (el.dataset.undoAttached) return;
    el.dataset.undoAttached = '1';
    el.addEventListener('focus', function() { lastState = captureState(); });
    el.addEventListener('input', function() {
      clearTimeout(undoTimeout);
      undoTimeout = setTimeout(pushState, 600);
    });
    el.addEventListener('change', pushState);
  });
}

function saveFile() {
  var html = document.documentElement.outerHTML;
  var blob = new Blob([html], {type:'text/html'});
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'HIF-Social-Media-Caption-Bank.html'; a.click();
}

document.addEventListener('keydown', function(e) {
  var mod = e.metaKey || e.ctrlKey;
  if (mod && e.key === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
  if (mod && (e.key === 'Z' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); doRedo(); }
});

window.addEventListener('load', function() {
  createCard({
    platform: 'ig', status: 'posted', postType: 'Reel',
    caption: "Behind the scenes of our latest commercial shoot. Three cameras, one chance to get it right. Here\'s how we pulled it off...",
    hashtags: '#filmmaking #cinematography #bts #howitsfilmed #reel',
    date: '2024-04-15'
  });
  createCard({
    platform: 'tiktok', status: 'scheduled', postType: 'Short',
    caption: "POV: You\'re the gaffer and the director just asked for \"more cinematic\" lighting. Here\'s what that actually means ↓",
    hashtags: '#filmtok #gaffer #lighting #setlife #filmmaker',
    date: '2024-05-01'
  });
  createCard({
    platform: 'youtube', status: 'draft', postType: 'Long-form',
    caption: "We broke down EVERY camera choice in this award-winning documentary. From the opening wide to the final close-up — here\'s the visual language explained in full.",
    hashtags: '#documentary #cinematography #camerawork #filmanalysis',
    date: ''
  });
  attachUndoListeners();
  lastState = captureState();
  updateButtons();
});
</script>
</body>
</html>
