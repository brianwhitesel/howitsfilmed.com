<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Cut Planner — How It's Filmed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  --bg: #FAFAFA; --bg2: #FFFFFF; --bg3: #F2F2F2; --bg4: #EBEBEB;
  --border: #E0E0E0; --border2: #D0D0D0;
  --accent: #FF3333; --accent2: #CC2020;
  --text: #1A1A1A; --text2: #555555; --text3: #999999;
  --logo-ink: #1a1a1a; --logo-bg: #FAFAFA;
  --font-ui: 'Inter', sans-serif; --font-head: 'Bebas Neue', sans-serif;
}
[data-theme="dark"] {
  --bg: #1A1A1A; --bg2: #212121; --bg3: #2a2a2a; --bg4: #2f2f2f;
  --border: #252525; --border2: #2e2e2e;
  --accent: #FF3333; --accent2: #CC2020;
  --text: #FFFFFF; --text2: #9a9490; --text3: #5a5650;
  --logo-ink: #FFFFFF; --logo-bg: #1A1A1A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 13px; min-height: 100vh; }
.toolbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 6px 48px; display: flex; align-items: center; gap: 8px;
}
.toolbar-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; border: 1px solid var(--border); color: var(--text2);
  font-family: var(--font-ui); font-size: 11px; font-weight: 500;
  letter-spacing: 0.06em; padding: 5px 12px; cursor: pointer;
  border-radius: 2px; transition: all 0.15s; white-space: nowrap;
}
.toolbar-btn:hover { border-color: var(--text3); color: var(--text); }
.toolbar-btn.save-btn { border-color: var(--accent2); color: var(--accent); }
.toolbar-btn.save-btn:hover { background: rgba(255,51,51,0.08); }
.theme-toggle {
  margin-left: auto; background: transparent; border: 1px solid var(--border);
  color: var(--text2); font-size: 14px; padding: 4px 10px; cursor: pointer;
  border-radius: 2px; transition: all 0.15s; line-height: 1;
  font-family: var(--font-ui, sans-serif);
}
.theme-toggle:hover { border-color: var(--accent2); color: var(--accent); }
[data-theme="dark"] .theme-icon::before { content: "\2600"; }
[data-theme="light"] .theme-icon::before { content: "\1F319"; }
.accent-rule { height: 2px; background: linear-gradient(90deg, var(--accent) 0%, transparent 60%); }
.page-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 48px 64px; }
.doc-header { display: flex; align-items: flex-start; gap: 32px; margin-bottom: 28px; flex-wrap: wrap; }
.doc-titles { flex: 1; min-width: 200px; }
.doc-title { font-family: var(--font-head); font-size: 38px; line-height: 1; color: var(--text); letter-spacing: 0.02em; margin-bottom: 2px; }
.doc-subtitle { font-size: 10px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; flex: 2; min-width: 280px; }
.meta-field { display: flex; flex-direction: column; gap: 3px; }
.meta-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
.meta-input {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  font-family: var(--font-ui); font-size: 12px; padding: 5px 8px;
  border-radius: 2px; outline: none; width: 100%;
}
.meta-input:focus { border-color: var(--accent2); }
.stats-strip {
  display: flex; gap: 0; border: 1px solid var(--border); border-radius: 4px;
  overflow: hidden; margin-bottom: 24px; background: var(--bg2);
}
.stat-box {
  flex: 1; padding: 12px 16px; border-right: 1px solid var(--border);
  text-align: center;
}
.stat-box:last-child { border-right: none; }
.stat-val { font-family: var(--font-head); font-size: 28px; color: var(--accent); line-height: 1; }
.stat-lbl { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-top: 2px; }
.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.pill {
  padding: 4px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--bg2); color: var(--text2); font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; font-family: var(--font-ui);
}
.pill:hover { border-color: var(--accent2); color: var(--accent); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 4px; background: var(--bg2); margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
thead tr { background: var(--bg3); }
th {
  padding: 8px 10px; text-align: left; font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text3); font-weight: 600;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
td {
  padding: 6px 8px; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }
.row-num { color: var(--text3); font-size: 11px; text-align: center; min-width: 28px; }
.td-input {
  background: transparent; border: 1px solid transparent; color: var(--text);
  font-family: var(--font-ui); font-size: 12px; padding: 3px 6px;
  border-radius: 2px; width: 100%; outline: none; min-width: 80px;
}
.td-input:focus { background: var(--bg3); border-color: var(--border2); }
.td-select {
  background: transparent; border: 1px solid transparent; color: var(--text);
  font-family: var(--font-ui); font-size: 12px; padding: 3px 4px;
  border-radius: 2px; outline: none; cursor: pointer; width: 100%;
}
.td-select:focus { background: var(--bg3); border-color: var(--border2); }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 2px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.05em; white-space: nowrap;
}
.badge-gray { background: var(--bg4); color: var(--text2); }
.badge-amber { background: #FFF3E0; color: #E07000; }
.badge-blue { background: #E3EEFF; color: #2060CC; }
.badge-green { background: #E3FFEC; color: #1A8A3A; }
[data-theme="dark"] .badge-amber { background: #3a2800; color: #ffb340; }
[data-theme="dark"] .badge-blue { background: #0a1f4a; color: #5599ff; }
[data-theme="dark"] .badge-green { background: #0a2a14; color: #40cc70; }
.plat-badge {
  display: inline-block; padding: 2px 7px; border-radius: 2px;
  font-size: 10px; font-weight: 600; white-space: nowrap;
}
.plat-ig { background: #fce4ec; color: #c2185b; }
.plat-tt { background: #e8eaf6; color: #3949ab; }
.plat-yt { background: #ffebee; color: #c62828; }
.plat-story { background: #fce4ec; color: #ad1457; }
.plat-li { background: #e3f2fd; color: #1565c0; }
.plat-fb { background: #e8f0fe; color: #1a56db; }
[data-theme="dark"] .plat-ig { background: #3a0018; color: #ff80ab; }
[data-theme="dark"] .plat-tt { background: #0d0f2a; color: #9fa8da; }
[data-theme="dark"] .plat-yt { background: #2a0000; color: #ef9a9a; }
[data-theme="dark"] .plat-story { background: #2a0010; color: #f48fb1; }
[data-theme="dark"] .plat-li { background: #001a2a; color: #64b5f6; }
[data-theme="dark"] .plat-fb { background: #001230; color: #90caf9; }
.del-btn {
  background: transparent; border: none; color: var(--text3); cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 2px; transition: all 0.15s;
  line-height: 1;
}
.del-btn:hover { color: var(--accent); background: rgba(255,51,51,0.08); }
.add-btn {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px dashed var(--border2); background: transparent;
  color: var(--text3); font-family: var(--font-ui); font-size: 11px; font-weight: 500;
  letter-spacing: 0.06em; padding: 7px 16px; cursor: pointer;
  border-radius: 2px; transition: all 0.15s;
}
.add-btn:hover { border-color: var(--accent2); color: var(--accent); }
.page-footer {
  margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
@media (max-width: 600px) {
  .page-wrap { padding: 16px; }
  .toolbar { padding: 6px 16px; }
  .meta-grid { grid-template-columns: 1fr; }
  .doc-header { flex-direction: column; gap: 16px; }
  .stats-strip { flex-wrap: wrap; }
  .stat-box { min-width: 50%; }
}
</style>
</head>

<script>
(function() {
  function toggleTheme() {
    var html = document.documentElement;
    var isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  }
  window.toggleTheme = toggleTheme;
  document.documentElement.setAttribute('data-theme', 'light');
})();

var rowCount = 0;
var activeFilter = 'All';

var platformClasses = {
  'IG Reel': 'plat-ig',
  'TikTok': 'plat-tt',
  'YouTube Short': 'plat-yt',
  'Story': 'plat-story',
  'LinkedIn': 'plat-li',
  'Facebook': 'plat-fb'
};

var statusClasses = {
  'To Cut': 'badge-gray',
  'Cutting': 'badge-amber',
  'Exported': 'badge-blue',
  'Posted': 'badge-green'
};

function addRow(data) {
  rowCount++;
  var tbody = document.getElementById('cuts-body');
  var tr = document.createElement('tr');
  tr.dataset.id = rowCount;
  var d = data || {};
  tr.innerHTML =
    '<td class="row-num">' + rowCount + '</td>' +
    '<td><select class="td-select plat-sel" onchange="updatePlatBadge(this);applyFilter();updateStats()">' +
      '<option value="IG Reel"' + (d.plat==='IG Reel'?' selected':'') + '>IG Reel</option>' +
      '<option value="TikTok"' + (d.plat==='TikTok'?' selected':'') + '>TikTok</option>' +
      '<option value="YouTube Short"' + (d.plat==='YouTube Short'?' selected':'') + '>YouTube Short</option>' +
      '<option value="Story"' + (d.plat==='Story'?' selected':'') + '>Story</option>' +
      '<option value="LinkedIn"' + (d.plat==='LinkedIn'?' selected':'') + '>LinkedIn</option>' +
      '<option value="Facebook"' + (d.plat==='Facebook'?' selected':'') + '>Facebook</option>' +
    '</select></td>' +
    '<td><input class="td-input" type="text" placeholder="Cut title" value="' + (d.title||'') + '"></td>' +
    '<td><input class="td-input tc-in" type="text" placeholder="00:00:00" value="' + (d.tcin||'') + '" style="min-width:72px" oninput="calcDuration(this.closest('tr'))"></td>' +
    '<td><input class="td-input tc-out" type="text" placeholder="00:00:00" value="' + (d.tcout||'') + '" style="min-width:72px" oninput="calcDuration(this.closest('tr'))"></td>' +
    '<td><input class="td-input tc-dur" type="text" placeholder="0:00" style="min-width:56px" readonly value="' + (d.dur||'') + '"></td>' +
    '<td><select class="td-select">' +
      '<option>9:16</option><option>1:1</option><option>16:9</option><option>4:5</option><option>2:3</option>' +
    '</select></td>' +
    '<td><input class="td-input" type="text" placeholder="Caption ideas..." value="' + (d.cap||'') + '"></td>' +
    '<td><select class="td-select status-sel" onchange="updateStatusBadge(this);updateStats()">' +
      '<option value="To Cut"' + (d.status==='To Cut'?' selected':'') + '>To Cut</option>' +
      '<option value="Cutting"' + (d.status==='Cutting'?' selected':'') + '>Cutting</option>' +
      '<option value="Exported"' + (d.status==='Exported'?' selected':'') + '>Exported</option>' +
      '<option value="Posted"' + (d.status==='Posted'?' selected':'') + '>Posted</option>' +
    '</select></td>' +
    '<td><button class="del-btn" onclick="deleteRow(this)">&#215;</button></td>';
  tbody.appendChild(tr);
  updatePlatBadge(tr.querySelector('.plat-sel'));
  updateStatusBadge(tr.querySelector('.status-sel'));
  updateStats();
  applyFilter();
}

function updatePlatBadge(sel) {
  var cls = platformClasses[sel.value] || 'plat-ig';
  sel.className = 'td-select plat-sel badge plat-badge ' + cls;
}

function updateStatusBadge(sel) {
  var cls = statusClasses[sel.value] || 'badge-gray';
  sel.className = 'td-select status-sel badge ' + cls;
}

function calcDuration(tr) {
  var inVal = tr.querySelector('.tc-in').value.trim();
  var outVal = tr.querySelector('.tc-out').value.trim();
  var durInput = tr.querySelector('.tc-dur');
  function tcToSec(tc) {
    var parts = tc.split(':').map(Number);
    if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
    if (parts.length === 2) return parts[0]*60 + parts[1];
    return 0;
  }
  if (inVal && outVal) {
    var diff = tcToSec(outVal) - tcToSec(inVal);
    if (diff > 0) {
      var m = Math.floor(diff/60), s = diff%60;
      durInput.value = m + ':' + (s<10?'0':'')+s;
      return;
    }
  }
  durInput.value = '';
}

function deleteRow(btn) {
  btn.closest('tr').remove();
  renumberRows();
  updateStats();
  applyFilter();
}

function renumberRows() {
  var rows = document.querySelectorAll('#cuts-body tr');
  rows.forEach(function(tr, i) { tr.querySelector('.row-num').textContent = i+1; });
}

function updateStats() {
  var rows = Array.from(document.querySelectorAll('#cuts-body tr'));
  var total = rows.length;
  var posted = rows.filter(function(r){ return r.querySelector('.status-sel').value === 'Posted'; }).length;
  var tocut = rows.filter(function(r){ return r.querySelector('.status-sel').value === 'To Cut'; }).length;
  var exported = rows.filter(function(r){ return r.querySelector('.status-sel').value === 'Exported'; }).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-posted').textContent = posted;
  document.getElementById('stat-tocut').textContent = tocut;
  document.getElementById('stat-exported').textContent = exported;
}

function setFilter(btn) {
  document.querySelectorAll('.pill').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  applyFilter();
}

function applyFilter() {
  var rows = document.querySelectorAll('#cuts-body tr');
  rows.forEach(function(tr) {
    var plat = tr.querySelector('.plat-sel').value;
    tr.style.display = (activeFilter === 'All' || plat === activeFilter) ? '' : 'none';
  });
}

function saveFile() {
  var doctype = '<!DOCTYPE html>';
  var clone = document.documentElement.cloneNode(true);
  var liveInputs = Array.from(document.querySelectorAll('input, select, textarea'));
  var cloneInputs = Array.from(clone.querySelectorAll('input, select, textarea'));
  liveInputs.forEach(function(live, i) {
    var cl = cloneInputs[i];
    if (!cl) return;
    if (live.type === 'checkbox') {
      if (live.checked) cl.setAttribute('checked', 'checked');
      else cl.removeAttribute('checked');
    } else if (live.tagName === 'SELECT') {
      Array.from(cl.options).forEach(function(opt, j) {
        if (live.options[j] && live.options[j].selected) opt.setAttribute('selected', 'selected');
        else opt.removeAttribute('selected');
      });
    } else {
      cl.setAttribute('value', live.value);
    }
  });
  var toolbarEl = clone.querySelector('.toolbar');
  if (toolbarEl) toolbarEl.remove();
  var html = doctype + '\n' + clone.outerHTML;
  var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'HIF-Social-Cut-Planner.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
